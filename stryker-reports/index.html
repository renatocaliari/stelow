te Functions readSourceFile truncates large files to 50000 chars"},{"id":"31","name":"REAL State Functions truncateText returns text unchanged if under maxLen"},{"id":"32","name":"REAL State Functions truncateText truncates text over maxLen"},{"id":"33","name":"REAL State Functions truncateText leaves room for truncation marker"},{"id":"34","name":"REAL State Functions isInsideWorktree returns boolean (not throws) for invalid git dir"},{"id":"35","name":"REAL State Functions getDefaultBranch returns string (main fallback for non-git)"}],"source":"/**\n * Unit tests: REAL State Functions\n * \n * Tests actual exported functions from state.ts:\n * - readTracking / writeTracking\n * - getActiveWorkflow / getAllActiveWorkflows\n * - renameWorkflow\n * - reconcileTracking\n * - archiveWorkflowOnDisk\n * - parseInputForWorkflow\n * \n * These tests import and exercise REAL code, not mocks.\n */\nimport { describe, it, expect, beforeEach, afterEach } from 'vitest';\nimport { \n  mkdtempSync, rmSync, writeFileSync, readFileSync, existsSync, mkdirSync \n} from 'node:fs';\nimport { join } from 'node:path';\nimport { tmpdir } from 'node:os';\nimport {\n  readTracking,\n  writeTracking,\n  getActiveWorkflow,\n  getAllActiveWorkflows,\n  renameWorkflow,\n  reconcileTracking,\n  archiveWorkflowOnDisk,\n  parseInputForWorkflow,\n  generateDirHash,\n  hashToWorkflowId,\n  toSafeName,\n  getDateStamp,\n  suggestNameFromDraft,\n  readSourceFile,\n  truncateText,\n  isInsideWorktree,\n  getDefaultBranch,\n} from '../../extensions/cali-product-workflow/state';\nimport type { Workflow, TrackingData } from '../../extensions/cali-product-workflow/types';\n\ndescribe('REAL State Functions', () => {\n  let tempDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-real-state-'));\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  // ── Helper: minimal workflow factory ──────────────────────────────\n\n  const workflow = (name: string, status: Workflow['status'] = 'in-progress', phase = 0): Workflow => ({\n    name,\n    description: '',\n    status,\n    currentPhase: phase,\n    phases: [],\n    created: new Date().toISOString(),\n    updated: new Date().toISOString(),\n    dirHash: `pw-${name.replace(/\\s+/g, '-').toLowerCase().slice(0, 8)}`,\n  });\n\n  // ── readTracking / writeTracking ──────────────────────────────────────\n\n  describe('readTracking / writeTracking', () => {\n    it('readTracking returns null when tracking does not exist', () => {\n      const result = readTracking(tempDir);\n      expect(result).toBeNull();\n    });\n\n    it('readTracking reads what writeTracking wrote', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      \n      const data: TrackingData = {\n        $schema: 'https://example.com/schema',\n        version: '1.0',\n        created: '2026-05-19T00:00:00Z',\n        updated: '2026-05-19T00:00:00Z',\n        workflows: []\n      };\n\n      writeTracking(tempDir, data);\n      const result = readTracking(tempDir);\n\n      expect(result).not.toBeNull();\n      expect(result?.version).toBe('1.0');\n      expect(result?.workflows).toEqual([]);\n    });\n\n    it('writeTracking persists data across calls', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      \n      const data: TrackingData = {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [workflow('test')]\n      };\n\n      writeTracking(tempDir, data);\n      \n      const read = readTracking(tempDir);\n      expect(read?.workflows).toHaveLength(1);\n      expect(read?.workflows[0].name).toBe('test');\n    });\n\n    it('handles empty workflows array', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      \n      const data: TrackingData = {\n        $schema: '',\n        version: '1.0',\n        created: new Date().toISOString(),\n        updated: new Date().toISOString(),\n        workflows: []\n      };\n\n      writeTracking(tempDir, data);\n      const result = readTracking(tempDir);\n\n      expect(result?.workflows).toHaveLength(0);\n    });\n  });\n\n  // ── getActiveWorkflow ───────────────────────────────────────────────\n\n  describe('getActiveWorkflow', () => {\n    it('returns null when no workflows', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '', version: '1.0', created: '', updated: '', workflows: []\n      } as TrackingData);\n\n      const result = getActiveWorkflow(tempDir);\n      expect(result).toBeNull();\n    });\n\n    it('returns the in-progress workflow', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [\n          workflow('active-workflow', 'in-progress', 3),\n          workflow('paused-workflow', 'paused', 2),\n        ]\n      } as TrackingData);\n\n      const result = getActiveWorkflow(tempDir);\n      expect(result?.name).toBe('active-workflow');\n    });\n\n    it('returns null when no in-progress workflow', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [\n          workflow('completed-workflow', 'completed', 10),\n          workflow('archived-workflow', 'archived', 10),\n        ]\n      } as TrackingData);\n\n      const result = getActiveWorkflow(tempDir);\n      expect(result).toBeNull();\n    });\n\n    it('returns first in-progress when multiple', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [\n          workflow('first', 'in-progress', 1),\n          workflow('second', 'in-progress', 2),\n        ]\n      } as TrackingData);\n\n      const result = getActiveWorkflow(tempDir);\n      expect(result?.name).toBe('first');\n    });\n  });\n\n  // ── getAllActiveWorkflows ─────────────────────────────────────────\n\n  describe('getAllActiveWorkflows', () => {\n    it('returns empty when no workflows', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '', version: '1.0', created: '', updated: '', workflows: []\n      } as TrackingData);\n\n      const result = getAllActiveWorkflows(tempDir);\n      expect(result).toEqual([]);\n    });\n\n    it('returns all in-progress workflows', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [\n          workflow('workflow-1', 'in-progress', 2),\n          workflow('workflow-2', 'in-progress', 5),\n          workflow('workflow-3', 'completed', 10),\n        ]\n      } as TrackingData);\n\n      const result = getAllActiveWorkflows(tempDir);\n      expect(result).toHaveLength(2);\n    });\n  });\n\n  // ── renameWorkflow ─────────────────────────────────────────────────\n\n  describe('renameWorkflow', () => {\n    it('renames existing workflow', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [workflow('old-name')]\n      } as TrackingData);\n\n      const result = renameWorkflow(tempDir, 'old-name', 'new-name');\n      expect(result.ok).toBe(true);\n\n      const tracking = readTracking(tempDir);\n      expect(tracking?.workflows.find(w => w.name === 'new-name')).toBeDefined();\n      expect(tracking?.workflows.find(w => w.name === 'old-name')).toBeUndefined();\n    });\n\n    it('fails when workflow not found', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: []\n      } as TrackingData);\n\n      const result = renameWorkflow(tempDir, 'nonexistent', 'new-name');\n      expect(result.ok).toBe(false);\n    });\n\n    it('fails with short name', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: [workflow('test')]\n      } as TrackingData);\n\n      const result = renameWorkflow(tempDir, 'test', 'x');\n      expect(result.ok).toBe(false);\n      expect((result as { ok: false; error: string }).error).toContain('at least 2 characters');\n    });\n  });\n\n  // ── reconcileTracking ──────────────────────────────────────────────\n\n  describe('reconcileTracking', () => {\n    it('detects workflows on disk not in tracking', () => {\n      // Create workflow on disk\n      const wfDir = join(tempDir, '.cali-product-workflow', '2026-05-19', 'pw-disk-workflow');\n      mkdirSync(wfDir, { recursive: true });\n      writeFileSync(join(wfDir, 'index.json'), JSON.stringify({\n        name: 'disk-workflow',\n        _dir: 'pw-disk-workflow',\n        workflow_status: 'in-progress',\n        current_phase_index: 2,\n      }));\n\n      // Tracking has no workflows\n      writeTracking(tempDir, {\n        $schema: '',\n        version: '1.0',\n        created: '',\n        updated: '',\n        workflows: []\n      } as TrackingData);\n\n      reconcileTracking(tempDir);\n\n      const tracking = readTracking(tempDir);\n      const diskWorkflow = tracking?.workflows.find(w => w.name === 'disk-workflow');\n      expect(diskWorkflow).toBeDefined();\n      expect(diskWorkflow?.currentPhase).toBe(2);\n    });\n  });\n\n  // ── archiveWorkflowOnDisk ──────────────────────────────────────────\n\n  describe('archiveWorkflowOnDisk', () => {\n    it('archives workflow in index.json', () => {\n      const wfDir = join(tempDir, '.cali-product-workflow', '2026-05-19', 'pw-archive-test');\n      mkdirSync(wfDir, { recursive: true });\n      writeFileSync(join(wfDir, 'index.json'), JSON.stringify({\n        name: 'test-workflow',\n        _dir: 'pw-archive-test',\n        workflow_status: 'in-progress',\n        current_phase_index: 5,\n      }));\n\n      const result = archiveWorkflowOnDisk(tempDir, 'test-workflow');\n      expect(result).toBe(true);\n\n      const index = JSON.parse(readFileSync(join(wfDir, 'index.json'), 'utf-8'));\n      expect(index.workflow_status).toBe('archived');\n      expect(index.updated_at).toBeDefined();\n    });\n\n    it('returns false when workflow not found', () => {\n      const result = archiveWorkflowOnDisk(tempDir, 'nonexistent-workflow');\n      expect(result).toBe(false);\n    });\n\n    it('returns false when no workflows directory exists', () => {\n      mkdirSync(join(tempDir, '.cali-product-workflow'), { recursive: true });\n\n      const result = archiveWorkflowOnDisk(tempDir, 'any-workflow');\n      expect(result).toBe(false);\n    });\n\n    it('updates only target workflow in date directory', () => {\n      const wf1 = join(tempDir, '.cali-product-workflow', '2026-05-19', 'pw-workflow-1');\n      const wf2 = join(tempDir, '.cali-product-workflow', '2026-05-19', 'pw-workflow-2');\n      mkdirSync(wf1, { recursive: true });\n      mkdirSync(wf2, { recursive: true });\n      \n      writeFileSync(join(wf1, 'index.json'), JSON.stringify({\n        name: 'workflow-1',\n        _dir: 'pw-workflow-1',\n        workflow_status: 'in-progress',\n      }));\n      writeFileSync(join(wf2, 'index.json'), JSON.stringify({\n        name: 'workflow-2',\n        _dir: 'pw-workflow-2',\n        workflow_status: 'in-progress',\n      }));\n\n      const result = archiveWorkflowOnDisk(tempDir, 'workflow-1');\n      expect(result).toBe(true);\n\n      const index1 = JSON.parse(readFileSync(join(wf1, 'index.json'), 'utf-8'));\n      expect(index1.workflow_status).toBe('archived');\n\n      const index2 = JSON.parse(readFileSync(join(wf2, 'index.json'), 'utf-8'));\n      expect(index2.workflow_status).toBe('in-progress');\n    });\n  });\n\n  // ── parseInputForWorkflow ──────────────────────────────────────────\n\n  describe('parseInputForWorkflow', () => {\n    it('extracts file references', () => {\n      const input = 'Build @src/main.ts and @lib/utils.ts for me';\n      const result = parseInputForWorkflow(input);\n\n      expect(result.sources).toContain('./src/main.ts');\n      expect(result.sources).toContain('./lib/utils.ts');\n    });\n\n    it('extracts text without file references', () => {\n      const input = 'Build a snake game in Go';\n      const result = parseInputForWorkflow(input);\n\n      expect(result.sources).toHaveLength(0);\n      expect(result.draftText).toContain('snake game');\n    });\n\n    it('handles empty input', () => {\n      const result = parseInputForWorkflow('');\n      expect(result.sources).toHaveLength(0);\n      expect(result.draftText).toBe('');\n    });\n  });\n\n  // ── Utility Functions ──────────────────────────────────────────────\n\ndescribe('Utility Functions', () => {\n    it('generateDirHash creates pw- prefixed hash', () => {\n      const hash1 = generateDirHash();\n      const hash2 = generateDirHash();\n\n      expect(hash1.startsWith('pw-')).toBe(true);\n      expect(hash2.startsWith('pw-')).toBe(true);\n      expect(hash1).not.toBe(hash2);\n    });\n\n    it('hashToWorkflowId extracts last segment of hash', () => {\n      expect(hashToWorkflowId('pw-ollc-whkaxv')).toBe('wf-whkaxv');\n      expect(hashToWorkflowId('pw-test-abc')).toBe('wf-abc');\n    });\n\n    it('toSafeName converts to lowercase with dashes', () => {\n      expect(toSafeName('My Project!')).toBe('my-project');\n      expect(toSafeName('API v2.0')).toBe('api-v2-0');\n      expect(toSafeName('')).toBe('');\n    });\n\n    it('getDateStamp returns ISO date', () => {\n      const stamp = getDateStamp();\n      expect(stamp).toMatch(/^\\d{4}-\\d{2}-\\d{2}$/);\n    });\n\n    it('suggestNameFromDraft extracts keywords', () => {\n      const draft = 'Build a snake game in Go for terminal';\n      const suggestion = suggestNameFromDraft(draft);\n\n      expect(suggestion).toBeTruthy();\n      expect(suggestion?.length).toBeGreaterThan(0);\n    });\n  });\n\n  // ── Additional Utility Functions ─────────────────────────────────────\n\n  describe('readSourceFile', () => {\n    it('returns null for non-existent file', () => {\n      const result = readSourceFile('./nonexistent-file-xyz.txt');\n      expect(result).toBeNull();\n    });\n\n    it('returns directory info for directory', () => {\n      const result = readSourceFile(tempDir);\n      expect(result).toContain('Directory:');\n    });\n\n    it('reads file content for existing file', () => {\n      writeFileSync(join(tempDir, 'test.txt'), 'Hello World');\n      const result = readSourceFile(join(tempDir, 'test.txt'));\n      expect(result).toBe('Hello World');\n    });\n\n    it('prepends ./ if missing', () => {\n      writeFileSync(join(tempDir, 'test2.txt'), 'Test content');\n      const result = readSourceFile(join(tempDir, 'test2.txt').replace('./', ''));\n      expect(result).toBe('Test content');\n    });\n\n    it('truncates large files to 50000 chars', () => {\n      const largeContent = 'x'.repeat(60000);\n      writeFileSync(join(tempDir, 'large.txt'), largeContent);\n      const result = readSourceFile(join(tempDir, 'large.txt'));\n      expect(result?.length).toBeLessThanOrEqual(50000);\n    });\n  });\n\n  describe('truncateText', () => {\n    it('returns text unchanged if under maxLen', () => {\n      const text = 'Short text';\n      expect(truncateText(text, 100)).toBe(text);\n    });\n\n    it('truncates text over maxLen', () => {\n      const text = 'x'.repeat(200);\n      const result = truncateText(text, 100);\n      expect(result).toContain('[... truncated ...]');\n      expect(result.length).toBeLessThan(150);\n    });\n\n    it('leaves room for truncation marker', () => {\n      const result = truncateText('Hello World', 5);\n      expect(result).toMatch(/\\.\\.\\. truncated \\.\\.\\./);\n    });\n  });\n\n  describe('isInsideWorktree', () => {\n    it('returns boolean (not throws) for invalid git dir', () => {\n      // Non-git directory should return false, not throw\n      expect(() => isInsideWorktree(tempDir)).not.toThrow();\n    });\n  });\n\n  describe('getDefaultBranch', () => {\n    it('returns string (main fallback for non-git)', () => {\n      // Non-git directory should return 'main' fallback, not throw\n      expect(() => getDefaultBranch(tempDir)).not.toThrow();\n    });\n  });\n});"},"tests/unit/scan-workflow-dirs.test.ts":{"tests":[{"id":"36","name":"scanWorkflowDirs returns empty array when workflow directory does not exist"},{"id":"37","name":"scanWorkflowDirs returns empty array when workflow directory is empty"},{"id":"38","name":"scanWorkflowDirs scans and returns workflows from date-stamped directories"},{"id":"39","name":"scanWorkflowDirs extracts name from index.json"},{"id":"40","name":"scanWorkflowDirs extracts name from legacy slug field"},{"id":"41","name":"scanWorkflowDirs falls back to dirHash when index has no name or slug"},{"id":"42","name":"scanWorkflowDirs extracts workflow_status"},{"id":"43","name":"scanWorkflowDirs defaults status to unknown when workflow_status is missing"},{"id":"44","name":"scanWorkflowDirs extracts current_phase_index"},{"id":"45","name":"scanWorkflowDirs defaults currentPhase to 0 when current_phase_index is missing"},{"id":"46","name":"scanWorkflowDirs extracts draft content"},{"id":"47","name":"scanWorkflowDirs extracts artifacts"},{"id":"48","name":"scanWorkflowDirs extracts created_at and updated_at timestamps"},{"id":"49","name":"scanWorkflowDirs scans across multiple date directories"},{"id":"50","name":"scanWorkflowDirs ignores non-date directories in workflow root"},{"id":"51","name":"scanWorkflowDirs ignores directories that do not match YYYY-MM-DD pattern"},{"id":"52","name":"scanWorkflowDirs skips corrupt index.json files"},{"id":"53","name":"scanWorkflowDirs skips directories without index.json"},{"id":"54","name":"scanWorkflowDirs handles non-existent scan directory gracefully"},{"id":"55","name":"scanWorkflowDirs provides data format compatible with reconcileTracking"},{"id":"56","name":"scanWorkflowDirs returns all workflow statuses (reconcileTracking filters them)"}],"source":"/**\n * Unit tests: scanWorkflowDirs function\n * \n * Tests the disk-scanning logic that powers:\n * - reconcileTracking (auto-imports orphan workflows from disk)\n * - archiveWorkflowOnDisk (marks workflows as archived)\n * \n * This function reads .cali-product-workflow/<"+"date>/<"+"dirHash>/index.json\n * and extracts metadata for workflow management.\n */\nimport { describe, it, expect, beforeEach, afterEach } from 'vitest';\nimport { \n  mkdtempSync, rmSync, writeFileSync, existsSync, mkdirSync \n} from 'node:fs';\nimport { join } from 'node:path';\nimport { tmpdir } from 'node:os';\nimport { scanWorkflowDirs } from '../../extensions/cali-product-workflow/state';\n\ndescribe('scanWorkflowDirs', () => {\n  let tempDir: string;\n  let workflowDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-scan-'));\n    workflowDir = join(tempDir, '.cali-product-workflow');\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  // ── Helper: create workflow index.json ─────────────────────────────\n\n  /**\n   * Create a workflow directory with index.json.\n   * Fields not specified get the value undefined (not present in JSON).\n   */\n  function createWorkflow(date: string, dirHash: string, data: Record<"+"string, unknown>): void {\n    const dir = join(workflowDir, date, dirHash);\n    mkdirSync(dir, { recursive: true });\n    writeFileSync(join(dir, 'index.json'), JSON.stringify(data));\n  }\n\n  /**\n   * Create a workflow with all required fields (for override testing).\n   */\n  function createFullWorkflow(date: string, dirHash: string, overrides: Record<"+"string, unknown> = {}): void {\n    const data = {\n      name: 'default-name',\n      workflow_status: 'in-progress',\n      current_phase_index: 0,\n      created_at: new Date().toISOString(),\n      updated_at: new Date().toISOString(),\n      ...overrides,\n    };\n    createWorkflow(date, dirHash, data);\n  }\n\n  // ── Basic functionality ────────────────────────────────────────────\n\n  it('returns empty array when workflow directory does not exist', () => {\n    const result = scanWorkflowDirs(tempDir);\n    expect(result).toEqual([]);\n  });\n\n  it('returns empty array when workflow directory is empty', () => {\n    mkdirSync(workflowDir, { recursive: true });\n    const result = scanWorkflowDirs(tempDir);\n    expect(result).toEqual([]);\n  });\n\n  it('scans and returns workflows from date-stamped directories', () => {\n    createFullWorkflow('2026-05-20', 'pw-test-abc1', { name: 'workflow-one' });\n    createFullWorkflow('2026-05-20', 'pw-test-abc2', { name: 'workflow-two' });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result).toHaveLength(2);\n    expect(result.map(w => w.name).sort()).toEqual(['workflow-one', 'workflow-two']);\n  });\n\n  it('extracts name from index.json', () => {\n    createFullWorkflow('2026-05-20', 'pw-test-abc1', { name: 'my-workflow' });\n    \n    const result = scanWorkflowDirs(tempDir);\n    \n    expect(result[0].name).toBe('my-workflow');\n    expect(result[0].dirHash).toBe('pw-test-abc1');\n    expect(result[0].dateStamp).toBe('2026-05-20');\n  });\n\n  it('extracts name from legacy slug field', () => {\n    // Only slug, no name - tests backward compatibility\n    createWorkflow('2026-05-20', 'pw-test-legacy', { slug: 'legacy-workflow' });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].name).toBe('legacy-workflow');\n  });\n\n  it('falls back to dirHash when index has no name or slug', () => {\n    // Minimal index with no name/slug fields\n    createWorkflow('2026-05-20', 'pw-fallback-dir', {});\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].name).toBe('pw-fallback-dir');\n  });\n\n  // ── Metadata extraction ─────────────────────────────────────────────\n\n  it('extracts workflow_status', () => {\n    createFullWorkflow('2026-05-20', 'pw-test-paused', { \n      name: 'paused-workflow',\n      workflow_status: 'paused' \n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].status).toBe('paused');\n  });\n\n  it('defaults status to unknown when workflow_status is missing', () => {\n    // Minimal index without workflow_status field\n    createWorkflow('2026-05-20', 'pw-no-status', { name: 'no-status-workflow' });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].status).toBe('unknown');\n  });\n\n  it('extracts current_phase_index', () => {\n    createFullWorkflow('2026-05-20', 'pw-phase-3', { \n      name: 'phase-workflow',\n      current_phase_index: 3 \n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].currentPhase).toBe(3);\n  });\n\n  it('defaults currentPhase to 0 when current_phase_index is missing', () => {\n    // Minimal index without current_phase_index\n    createWorkflow('2026-05-20', 'pw-no-phase', { name: 'no-phase-workflow' });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].currentPhase).toBe(0);\n  });\n\n  it('extracts draft content', () => {\n    createFullWorkflow('2026-05-20', 'pw-draft-test', {\n      name: 'draft-workflow',\n      draft: '# My Draft Content\\n\\nSome text.'\n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].draftContent).toBe('# My Draft Content\\n\\nSome text.');\n  });\n\n  it('extracts artifacts', () => {\n    createFullWorkflow('2026-05-20', 'pw-artifacts-test', {\n      name: 'artifacts-workflow',\n      artifacts: { spec: '/path/to/spec.md', schema: '/path/to/schema.json' }\n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].artifacts).toEqual({\n      spec: '/path/to/spec.md',\n      schema: '/path/to/schema.json',\n    });\n  });\n\n  it('extracts created_at and updated_at timestamps', () => {\n    const now = new Date().toISOString();\n    createFullWorkflow('2026-05-20', 'pw-timestamps', {\n      name: 'timestamp-workflow',\n      created_at: now,\n      updated_at: now,\n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result[0].created).toBe(now);\n    expect(result[0].updated).toBe(now);\n  });\n\n  // ── Date directory handling ───────────────────────────────────────────\n\n  it('scans across multiple date directories', () => {\n    createFullWorkflow('2026-05-10', 'pw-old-001', { name: 'old-workflow' });\n    createFullWorkflow('2026-05-20', 'pw-mid-002', { name: 'mid-workflow' });\n    createFullWorkflow('2026-05-30', 'pw-new-003', { name: 'new-workflow' });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result).toHaveLength(3);\n    expect(result.map(w => w.name).sort()).toEqual(['mid-workflow', 'new-workflow', 'old-workflow']);\n  });\n\n  it('ignores non-date directories in workflow root', () => {\n    createFullWorkflow('2026-05-20', 'pw-test-abc1', { name: 'valid-workflow' });\n    mkdirSync(join(workflowDir, 'not-a-date'), { recursive: true });\n    \n    const result = scanWorkflowDirs(tempDir);\n    \n    expect(result).toHaveLength(1);\n    expect(result[0].name).toBe('valid-workflow');\n  });\n\n  it('ignores directories that do not match YYYY-MM-DD pattern', () => {\n    createFullWorkflow('2026-05-20', 'pw-test-abc1', { name: 'valid' });\n    mkdirSync(join(workflowDir, '2026-13-40'), { recursive: true });\n    mkdirSync(join(workflowDir, 'May-2026'), { recursive: true });\n    \n    const result = scanWorkflowDirs(tempDir);\n    \n    expect(result).toHaveLength(1);\n    expect(result[0].name).toBe('valid');\n  });\n\n  // ── Error handling ──────────────────────────────────────────────────\n\n  it('skips corrupt index.json files', () => {\n    createFullWorkflow('2026-05-20', 'pw-valid-001', { name: 'valid-workflow' });\n    \n    const corruptDir = join(workflowDir, '2026-05-20', 'pw-corrupt-002');\n    mkdirSync(corruptDir, { recursive: true });\n    writeFileSync(join(corruptDir, 'index.json'), 'not valid json {{{');\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result).toHaveLength(1);\n    expect(result[0].name).toBe('valid-workflow');\n  });\n\n  it('skips directories without index.json', () => {\n    createFullWorkflow('2026-05-20', 'pw-has-index', { name: 'has-index' });\n    \n    const noIndexDir = join(workflowDir, '2026-05-20', 'pw-no-index');\n    mkdirSync(noIndexDir, { recursive: true });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    expect(result).toHaveLength(1);\n    expect(result[0].name).toBe('has-index');\n  });\n\n  it('handles non-existent scan directory gracefully', () => {\n    const result = scanWorkflowDirs('/nonexistent/path/that/does/not/exist');\n    expect(result).toEqual([]);\n  });\n\n  // ── Integration with reconcileTracking ──────────────────────────────\n\n  it('provides data format compatible with reconcileTracking', () => {\n    createFullWorkflow('2026-05-20', 'pw-reconcile-001', { \n      name: 'orphan-workflow',\n      workflow_status: 'in-progress',\n      current_phase_index: 2,\n    });\n\n    const result = scanWorkflowDirs(tempDir);\n    const wf = result[0];\n\n    // reconcileTracking expects these fields\n    expect(wf).toHaveProperty('name');\n    expect(wf).toHaveProperty('status');\n    expect(wf).toHaveProperty('currentPhase');\n    expect(wf).toHaveProperty('dirHash');\n    expect(wf).toHaveProperty('dateStamp');\n    expect(wf).toHaveProperty('created');\n    expect(wf).toHaveProperty('updated');\n  });\n\n  it('returns all workflow statuses (reconcileTracking filters them)', () => {\n    createWorkflow('2026-05-20', 'pw-active', { \n      name: 'active-workflow',\n      workflow_status: 'in-progress' \n    });\n    createWorkflow('2026-05-20', 'pw-paused', { \n      name: 'paused-workflow',\n      workflow_status: 'paused' \n    });\n    createWorkflow('2026-05-20', 'pw-completed', { \n      name: 'completed-workflow',\n      workflow_status: 'completed' \n    });\n    createWorkflow('2026-05-20', 'pw-archived', { \n      name: 'archived-workflow',\n      workflow_status: 'archived' \n    });\n\n    const result = scanWorkflowDirs(tempDir);\n\n    // All statuses are returned (reconcileTracking filters them)\n    expect(result).toHaveLength(4);\n    expect(result.map(w => w.status)).toContain('in-progress');\n    expect(result.map(w => w.status)).toContain('paused');\n    expect(result.map(w => w.status)).toContain('completed');\n    expect(result.map(w => w.status)).toContain('archived');\n  });\n});"},"tests/unit/modules-file-store.test.ts":{"tests":[{"id":"57","name":"TextFileStore should return null when file does not exist"},{"id":"58","name":"TextFileStore should write and read text content"},{"id":"59","name":"TextFileStore should handle encoder/decoder"},{"id":"60","name":"TextFileStore should create parent directories automatically"},{"id":"61","name":"TextFileStore should overwrite existing content"},{"id":"62","name":"JsonFileStore should return null when file does not exist"},{"id":"63","name":"JsonFileStore should write and read JSON objects"},{"id":"64","name":"JsonFileStore should use replacer when writing"},{"id":"65","name":"JsonFileStore should use reviver when reading"},{"id":"66","name":"JsonFileStore should create parent directories automatically"},{"id":"67","name":"JsonFileStore should handle arrays"},{"id":"68","name":"JsonFileStore should handle empty arrays"},{"id":"69","name":"JsonFileStore should return null for invalid JSON"},{"id":"70","name":"MarkdownFileStore should return empty array when file does not exist"},{"id":"71","name":"MarkdownFileStore should write with default header and read items"},{"id":"72","name":"MarkdownFileStore should write with custom header"},{"id":"73","name":"MarkdownFileStore should skip header line when reading"},{"id":"74","name":"MarkdownFileStore should skip empty lines when reading"},{"id":"75","name":"MarkdownFileStore should write empty content with header"},{"id":"76","name":"MarkdownFileStore should create parent directories automatically"},{"id":"77","name":"MarkdownFileStore should handle special characters in items"},{"id":"78","name":"MarkdownFileStore should trim whitespace from items"},{"id":"79","name":"ensureDir should create nested directories"},{"id":"80","name":"ensureDir should not throw if directory exists"},{"id":"81","name":"ensureDir should be idempotent"}],"source":"/**\n * Unit tests: FileStore classes\n * \n * Tests the three file store implementations:\n * - TextFileStore: plain text read/write\n * - JsonFileStore: JSON serialization with replacer/reviver support\n * - MarkdownFileStore: markdown with header support for inbox\n */\n\nimport { describe, it, expect, beforeEach, afterEach } from 'vitest';\nimport { mkdtempSync, rmSync, existsSync, readFileSync, mkdirSync } from 'node:fs';\nimport { join } from 'node:path';\nimport { tmpdir } from 'node:os';\nimport { \n  TextFileStore, \n  JsonFileStore, \n  MarkdownFileStore,\n  ensureDir \n} from '../../extensions/cali-product-workflow/modules/file-store';\n\ndescribe('TextFileStore', () => {\n  let tempDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-text-'));\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  it('should return null when file does not exist', () => {\n    const store = new TextFileStore(join(tempDir, 'nonexistent.txt'));\n    expect(store.read()).toBeNull();\n    expect(store.exists()).toBe(false);\n  });\n\n  it('should write and read text content', () => {\n    const path = join(tempDir, 'test.txt');\n    const store = new TextFileStore(path);\n    \n    store.write('Hello, World!');\n    expect(store.read()).toBe('Hello, World!');\n    expect(store.exists()).toBe(true);\n  });\n\n  it('should handle encoder/decoder', () => {\n    const path = join(tempDir, 'encoded.txt');\n    const store = new TextFileStore(\n      path,\n      (s) => s.toUpperCase(),\n      (s) => s.toLowerCase()\n    );\n    \n    store.write('Hello');\n    expect(store.read()).toBe('hello'); // decoded\n  });\n\n  it('should create parent directories automatically', () => {\n    const path = join(tempDir, 'subdir', 'nested', 'test.txt');\n    const store = new TextFileStore(path);\n    \n    store.write('nested content');\n    expect(store.read()).toBe('nested content');\n  });\n\n  it('should overwrite existing content', () => {\n    const path = join(tempDir, 'overwrite.txt');\n    const store = new TextFileStore(path);\n    \n    store.write('first');\n    store.write('second');\n    expect(store.read()).toBe('second');\n  });\n});\n\ndescribe('JsonFileStore', () => {\n  let tempDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-json-'));\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  it('should return null when file does not exist', () => {\n    const store = new JsonFileStore<"+"{ name: string }>(join(tempDir, 'nonexistent.json'));\n    expect(store.read()).toBeNull();\n  });\n\n  it('should write and read JSON objects', () => {\n    const path = join(tempDir, 'test.json');\n    const store = new JsonFileStore<"+"{ name: string; value: number }>(path);\n    \n    store.write({ name: 'test', value: 42 });\n    const data = store.read();\n    expect(data).toEqual({ name: 'test', value: 42 });\n  });\n\n  it('should use replacer when writing', () => {\n    const path = join(tempDir, 'replacer.json');\n    const replacer = (_key: string, value: unknown) => {\n      if (typeof value === 'number') return value * 2;\n      return value;\n    };\n    const store = new JsonFileStore<"+"{ n: number }>(path, replacer);\n    \n    store.write({ n: 21 });\n    expect(store.read()?.n).toBe(42);\n  });\n\n  it('should use reviver when reading', () => {\n    const path = join(tempDir, 'reviver.json');\n    const store = new JsonFileStore<"+"{ value: number }>(join(tempDir, \"reviver.json\"), undefined, (_key, value) => {\n      if (typeof value === 'number') return value * 3;\n      return value;\n    });\n    \n    store.write({ value: 10 });\n    // Note: The reviver is NOT applied on write, only on read\n    // This test verifies the stored JSON is valid\n    const data = store.read();\n    expect(data?.value).toBeDefined();\n  });\n\n  it('should create parent directories automatically', () => {\n    const path = join(tempDir, 'subdir', 'nested', 'test.json');\n    const store = new JsonFileStore<"+"{ data: string }>(path);\n    \n    store.write({ data: 'nested' });\n    expect(store.read()).toEqual({ data: 'nested' });\n  });\n\n  it('should handle arrays', () => {\n    const path = join(tempDir, 'array.json');\n    const store = new JsonFileStore<"+"string[]>(path);\n    \n    store.write(['item1', 'item2', 'item3']);\n    expect(store.read()).toEqual(['item1', 'item2', 'item3']);\n  });\n\n  it('should handle empty arrays', () => {\n    const path = join(tempDir, 'empty.json');\n    const store = new JsonFileStore<"+"string[]>(path);\n    \n    store.write([]);\n    expect(store.read()).toEqual([]);\n  });\n\n  it('should return null for invalid JSON', () => {\n    // Manually create an invalid JSON file\n    const path = join(tempDir, 'invalid.json');\n    const { writeFileSync } = require('node:fs');\n    writeFileSync(path, 'not valid json {');\n    \n    const store = new JsonFileStore<"+"unknown>(path);\n    expect(store.read()).toBeNull();\n  });\n});\n\ndescribe('MarkdownFileStore', () => {\n  let tempDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-markdown-'));\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  it('should return empty array when file does not exist', () => {\n    const store = new MarkdownFileStore(join(tempDir, 'nonexistent.md'));\n    expect(store.read()).toEqual([]);\n  });\n\n  it('should write with default header and read items', () => {\n    const path = join(tempDir, 'items.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write(['item1', 'item2', 'item3']);\n    const items = store.read();\n    expect(items).toEqual(['item1', 'item2', 'item3']);\n  });\n\n  it('should write with custom header', () => {\n    const path = join(tempDir, 'custom.md');\n    const store = new MarkdownFileStore(path, '# Custom Header');\n    \n    store.write(['item1', 'item2']);\n    \n    // Verify the file has the header\n    const content = readFileSync(path, 'utf-8');\n    expect(content).toContain('# Custom Header');\n    expect(content).toContain('item1');\n    expect(content).toContain('item2');\n    \n    // But read() returns only items (no header)\n    expect(store.read()).toEqual(['item1', 'item2']);\n  });\n\n  it('should skip header line when reading', () => {\n    const path = join(tempDir, 'withheader.md');\n    const { writeFileSync } = require('node:fs');\n    writeFileSync(path, '# Inbox\\n\\nitem1\\nitem2\\n');\n    \n    const store = new MarkdownFileStore(path);\n    expect(store.read()).toEqual(['item1', 'item2']);\n  });\n\n  it('should skip empty lines when reading', () => {\n    const path = join(tempDir, 'emptylines.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write(['item1', '', 'item2', '   ', 'item3']);\n    // Empty strings get filtered out\n    expect(store.read()).toEqual(['item1', 'item2', 'item3']);\n  });\n\n  it('should write empty content with header', () => {\n    const path = join(tempDir, 'empty.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write([]);\n    \n    const content = readFileSync(path, 'utf-8');\n    expect(content).toContain('# Items');\n    expect(store.read()).toEqual([]);\n  });\n\n  it('should create parent directories automatically', () => {\n    const path = join(tempDir, 'subdir', 'nested', 'inbox.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write(['nested item']);\n    expect(store.read()).toEqual(['nested item']);\n  });\n\n  it('should handle special characters in items', () => {\n    const path = join(tempDir, 'special.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write(['item with # hash', 'item with [brackets]', 'normal item']);\n    const items = store.read();\n    // Only lines starting with # at the very beginning are skipped\n    // '# hash' at start of line is filtered as header\n    expect(items).toContain('item with [brackets]');\n    expect(items).toContain('normal item');\n  });\n\n  it('should trim whitespace from items', () => {\n    const path = join(tempDir, 'whitespace.md');\n    const store = new MarkdownFileStore(path);\n    \n    store.write(['  spaced item  ', 'normal']);\n    // Items are trimmed when read (this is the design)\n    expect(store.read()).toEqual(['spaced item', 'normal']);\n  });\n});\n\ndescribe('ensureDir', () => {\n  let tempDir: string;\n\n  beforeEach(() => {\n    tempDir = mkdtempSync(join(tmpdir(), 'pw-ensure-'));\n  });\n\n  afterEach(() => {\n    if (existsSync(tempDir)) {\n      rmSync(tempDir, { recursive: true, force: true });\n    }\n  });\n\n  it('should create nested directories', () => {\n    const path = join(tempDir, 'a', 'b', 'c', 'd');\n    ensureDir(path);\n    expect(existsSync(path)).toBe(true);\n  });\n\n  it('should not throw if directory exists', () => {\n    const path = join(tempDir, 'existing');\n    mkdirSync(path, { recursive: true });\n    ensureDir(path); // Should not throw\n    expect(existsSync(path)).toBe(true);\n  });\n\n  it('should be idempotent', () => {\n    const path = join(tempDir, 'multi', 'call');\n    ensureDir(path);\n    ensureDir(path);\n    ensureDir(path);\n    expect(existsSync(path)).toBe(true);\n  });\n});"},"tests/unit/state-manager.test.ts":{"tests":[{"id":"82","name":"State Manager loads default state when file missing"},{"id":"83","name":"State Manager transitions to next stage and updates history"},{"id":"84","name":"State Manager closes previous entry on second transition"},{"id":"85","name":"State Manager activates supervisor on execution stage"},{"id":"86","name":"State Manager saves state to disk persistently"},{"id":"87","name":"State Manager handles multiple transitions"}],"source":"import { describe, it, expect, beforeEach, afterEach } from \"vitest\";\nimport { existsSync, unlinkSync, mkdirSync } from \"fs\";\nimport { join } from \"path\";\nimport { tmpdir } from \"os\";\n\nimport type { StageState, StagesConfig } from \"../../types/stages\";\n\nfunction loadState(path: string): StageState {\n  if (!existsSync(path)) {\n    return {\n      current_stage: \"triage\",\n      previous_stage: null,\n      transitioned_at: new Date().toISOString(),\n      history: [],\n      gates_passed: [],\n      supervisor_active: false,\n    };\n  }\n  return JSON.parse(require(\"fs\").readFileSync(path, \"utf-8\"));\n}\n\nfunction saveState(path: string, state: StageState): void {\n  require(\"fs\").writeFileSync(path, JSON.stringify(state, null, 2), \"utf-8\");\n}\n\nfunction transition(\n  statePath: string,\n  toStage: string,\n  stages: StagesConfig,\n  _transitionType: string = \"next\"\n): StageState {\n  const state = loadState(statePath);\n  const stage = stages.stages.find((s) => s.name === toStage);\n  const now = new Date().toISOString();\n\n  if (state.history.length > 0) {\n    const last = state.history[state.history.length - 1];\n    if (last && !last.exited_at) {\n      last.exited_at = now;\n    }\n  }\n\n  state.history.push({\n    stage: toStage,\n    entered_at: now,\n    exited_at: null,\n  });\n\n  state.previous_stage = state.current_stage;\n  state.current_stage = toStage;\n  state.transitioned_at = now;\n  state.supervisor_active = stage?.supervisor ?? false;\n  saveState(statePath, state);\n  return state;\n}\n\nconst testStages: StagesConfig = {\n  stages: [\n    { name: \"triage\", order: 10, description: \"\", blocked_tools: [], allowed_tools: [], preferred_tools: [], primary_actions: [], transitions: {} },\n    { name: \"setup\", order: 20, description: \"\", blocked_tools: [], allowed_tools: [], preferred_tools: [], primary_actions: [], transitions: {} },\n    { name: \"execution\", order: 120, description: \"\", blocked_tools: [], allowed_tools: [], preferred_tools: [], primary_actions: [], transitions: {}, supervisor: true },\n  ],\n};\n\ndescribe(\"State Manager\", () => {\n  const testDir = join(tmpdir(), \"pw-state-test\");\n  const statePath = join(testDir, \"current-stage.json\");\n\n  beforeEach(() => {\n    try { mkdirSync(testDir, { recursive: true }); } catch { /* ok */ }\n    try { unlinkSync(statePath); } catch { /* ok */ }\n  });\n\n  afterEach(() => {\n    try { unlinkSync(statePath); } catch { /* ok */ }\n  });\n\n  it(\"loads default state when file missing\", () => {\n    const state = loadState(statePath);\n    expect(state.current_stage).toBe(\"triage\");\n    expect(state.previous_stage).toBeNull();\n    expect(state.supervisor_active).toBe(false);\n  });\n\n  it(\"transitions to next stage and updates history\", () => {\n    const state = transition(statePath, \"setup\", testStages);\n    expect(state.current_stage).toBe(\"setup\");\n    expect(state.previous_stage).toBe(\"triage\");\n    expect(state.history).toHaveLength(1);\n    expect(state.history[0].stage).toBe(\"setup\");\n    expect(state.history[0].exited_at).toBeNull();\n  });\n\n  it(\"closes previous entry on second transition\", () => {\n    transition(statePath, \"setup\", testStages);\n    const state = transition(statePath, \"execution\", testStages);\n    expect(state.history).toHaveLength(2);\n    expect(state.history[0].exited_at).not.toBeNull();\n    expect(state.history[0].stage).toBe(\"setup\");\n    expect(state.history[1].stage).toBe(\"execution\");\n  });\n\n  it(\"activates supervisor on execution stage\", () => {\n    transition(statePath, \"setup\", testStages);\n    const state = transition(statePath, \"execution\", testStages);\n    expect(state.current_stage).toBe(\"execution\");\n    expect(state.supervisor_active).toBe(true);\n  });\n\n  it(\"saves state to disk persistently\", () => {\n    transition(statePath, \"setup\", testStages);\n    const reloaded = loadState(statePath);\n    expect(reloaded.current_stage).toBe(\"setup\");\n  });\n\n  it(\"handles multiple transitions\", () => {\n    transition(statePath, \"setup\", testStages);\n    transition(statePath, \"execution\", testStages);\n    const state = transition(statePath, \"triage\", testStages);\n    expect(state.history).toHaveLength(3);\n    expect(state.current_stage).toBe(\"triage\");\n    expect(state.previous_stage).toBe(\"execution\");\n  });\n});\n"},"tests/unit/modules-cache.test.ts":{"tests":[{"id":"88","name":"CacheManager without file sync should start empty"},{"id":"89","name":"CacheManager without file sync should store and retrieve data"},{"id":"90","name":"CacheManager without file sync should overwrite previous data"},{"id":"91","name":"CacheManager without file sync should clear data"},{"id":"92","name":"CacheManager without file sync should return false for hasData when no file loader"},{"id":"93","name":"CacheManager with file sync should load from file when memory is empty"},{"id":"94","name":"CacheManager with file sync should not call loader when data is in memory"},{"id":"95","name":"CacheManager with file sync should call saver on set"},{"id":"96","name":"CacheManager with file sync should not call saver when no saver provided"},{"id":"97","name":"CacheManager with file sync should clear memory but not call file saver"},{"id":"98","name":"CacheManager with file sync should report hasData=true when file has data"},{"id":"99","name":"CacheManager with file sync should report hasData=false when file returns null"},{"id":"100","name":"CacheManager with file sync should report hasData=true when memory has data"},{"id":"101","name":"CacheManager with file sync should cache file load result in memory"},{"id":"102","name":"MapCache should get undefined for missing key"},{"id":"103","name":"MapCache should store and retrieve values"},{"id":"104","name":"MapCache should report has correctly"},{"id":"105","name":"MapCache should delete entries"},{"id":"106","name":"MapCache should return false when deleting non-existent key"},{"id":"107","name":"MapCache should clear all entries"},{"id":"108","name":"MapCache should report correct size"},{"id":"109","name":"MapCache should iterate keys"},{"id":"110","name":"MapCache should iterate values"},{"id":"111","name":"MapCache should iterate entries"},{"id":"112","name":"MapCache should overwrite existing key"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\nimport { CacheManager, MapCache } from '../../extensions/cali-product-workflow/modules/cache';\n\ndescribe('CacheManager', () => {\n  describe('without file sync', () => {\n    it('should start empty', () => {\n      const cache = new CacheManager<"+"string>();\n      expect(cache.get()).toBeNull();\n      expect(cache.isEmpty()).toBe(true);\n      expect(cache.hasData()).toBe(false);\n    });\n\n    it('should store and retrieve data', () => {\n      const cache = new CacheManager<"+"string>();\n      cache.set('hello');\n      expect(cache.get()).toBe('hello');\n      expect(cache.isEmpty()).toBe(false);\n      expect(cache.hasData()).toBe(true);\n    });\n\n    it('should overwrite previous data', () => {\n      const cache = new CacheManager<"+"number>();\n      cache.set(1);\n      cache.set(2);\n      expect(cache.get()).toBe(2);\n    });\n\n    it('should clear data', () => {\n      const cache = new CacheManager<"+"string>();\n      cache.set('data');\n      cache.clear();\n      expect(cache.get()).toBeNull();\n      expect(cache.isEmpty()).toBe(true);\n    });\n\n    it('should return false for hasData when no file loader', () => {\n      const cache = new CacheManager<"+"string>();\n      expect(cache.hasData()).toBe(false);\n    });\n  });\n\n  describe('with file sync', () => {\n    it('should load from file when memory is empty', () => {\n      const loader = vi.fn().mockReturnValue('from-file');\n      const cache = new CacheManager<"+"string>(loader);\n      expect(cache.get()).toBe('from-file');\n      expect(loader).toHaveBeenCalledTimes(1);\n    });\n\n    it('should not call loader when data is in memory', () => {\n      const loader = vi.fn().mockReturnValue('from-file');\n      const cache = new CacheManager<"+"string>(loader);\n      cache.set('in-memory');\n      loader.mockClear();\n      expect(cache.get()).toBe('in-memory');\n      expect(loader).not.toHaveBeenCalled();\n    });\n\n    it('should call saver on set', () => {\n      const saver = vi.fn();\n      const cache = new CacheManager<"+"string>(undefined, saver);\n      cache.set('data');\n      expect(saver).toHaveBeenCalledWith('data');\n    });\n\n    it('should not call saver when no saver provided', () => {\n      const cache = new CacheManager<"+"string>();\n      expect(() => cache.set('data')).not.toThrow();\n    });\n\n    it('should clear memory but not call file saver', () => {\n      const saver = vi.fn();\n      const cache = new CacheManager<"+"string>(undefined, saver);\n      cache.set('data');\n      saver.mockClear();\n      cache.clear();\n      expect(cache.get()).toBeNull();\n      expect(saver).not.toHaveBeenCalled();\n    });\n\n    it('should report hasData=true when file has data', () => {\n      const loader = vi.fn().mockReturnValue('from-file');\n      const cache = new CacheManager<"+"string>(loader);\n      expect(cache.hasData()).toBe(true);\n    });\n\n    it('should report hasData=false when file returns null', () => {\n      const loader = vi.fn().mockReturnValue(null);\n      const cache = new CacheManager<"+"string>(loader);\n      expect(cache.hasData()).toBe(false);\n    });\n\n    it('should report hasData=true when memory has data', () => {\n      const loader = vi.fn().mockReturnValue(null);\n      const cache = new CacheManager<"+"string>(loader);\n      cache.set('in-memory');\n      expect(cache.hasData()).toBe(true);\n    });\n\n    it('should cache file load result in memory', () => {\n      const loader = vi.fn().mockReturnValue('from-file');\n      const cache = new CacheManager<"+"string>(loader);\n      cache.get(); // loads from file\n      cache.get(); // should use memory\n      expect(loader).toHaveBeenCalledTimes(1);\n    });\n  });\n});\n\ndescribe('MapCache', () => {\n  let cache: MapCache<"+"string, number>;\n\n  beforeEach(() => {\n    cache = new MapCache<"+"string, number>();\n  });\n\n  it('should get undefined for missing key', () => {\n    expect(cache.get('missing')).toBeUndefined();\n  });\n\n  it('should store and retrieve values', () => {\n    cache.set('a', 1);\n    expect(cache.get('a')).toBe(1);\n  });\n\n  it('should report has correctly', () => {\n    expect(cache.has('a')).toBe(false);\n    cache.set('a', 1);\n    expect(cache.has('a')).toBe(true);\n  });\n\n  it('should delete entries', () => {\n    cache.set('a', 1);\n    expect(cache.delete('a')).toBe(true);\n    expect(cache.has('a')).toBe(false);\n  });\n\n  it('should return false when deleting non-existent key', () => {\n    expect(cache.delete('missing')).toBe(false);\n  });\n\n  it('should clear all entries', () => {\n    cache.set('a', 1);\n    cache.set('b', 2);\n    cache.clear();\n    expect(cache.size()).toBe(0);\n  });\n\n  it('should report correct size', () => {\n    expect(cache.size()).toBe(0);\n    cache.set('a', 1);\n    expect(cache.size()).toBe(1);\n    cache.set('b', 2);\n    expect(cache.size()).toBe(2);\n  });\n\n  it('should iterate keys', () => {\n    cache.set('a', 1);\n    cache.set('b', 2);\n    const keys = Array.from(cache.keys());\n    expect(keys).toContain('a');\n    expect(keys).toContain('b');\n  });\n\n  it('should iterate values', () => {\n    cache.set('a', 1);\n    cache.set('b', 2);\n    const values = Array.from(cache.values());\n    expect(values).toContain(1);\n    expect(values).toContain(2);\n  });\n\n  it('should iterate entries', () => {\n    cache.set('a', 1);\n    const entries = Array.from(cache.entries());\n    expect(entries).toEqual([['a', 1]]);\n  });\n\n  it('should overwrite existing key', () => {\n    cache.set('a', 1);\n    cache.set('a', 2);\n    expect(cache.get('a')).toBe(2);\n    expect(cache.size()).toBe(1);\n  });\n});\n"},"tests/unit/adapter-mutation.test.ts":{"tests":[{"id":"113","name":"Generic Adapter should have correct name"},{"id":"114","name":"Generic Adapter should return empty commands array"},{"id":"115","name":"Generic Adapter should return 4 basic tools with correct names"},{"id":"116","name":"Generic Adapter should format notifications with type prefix"},{"id":"117","name":"Generic Adapter should format error notifications with ERROR prefix"},{"id":"118","name":"Generic Adapter should format warning notifications with WARNING prefix"},{"id":"119","name":"Generic Adapter should format success notifications with SUCCESS prefix"},{"id":"120","name":"Event Dispatcher should emit session_start with cwd"},{"id":"121","name":"Event Dispatcher should emit tool_call with tool and input"},{"id":"122","name":"Event Dispatcher should emit turn_end with cwd"},{"id":"123","name":"Event Dispatcher should emit input with text and sessionId"},{"id":"124","name":"Event Dispatcher should emit agent_end with sessionId"},{"id":"125","name":"Event Dispatcher should unsubscribe handlers"},{"id":"126","name":"Event Dispatcher should support multiple listeners on same event"},{"id":"127","name":"Event Dispatcher should clear listeners on dispose"},{"id":"128","name":"Event Dispatcher should not throw when handler errors"},{"id":"129","name":"Event Dispatcher should pass cwd in turn_end dispatch"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\nimport {\n  createGenericAdapter,\n  type CLIAdapter,\n  type NotificationType,\n} from '../../extensions/cali-product-workflow/adapters/generic.js';\nimport {\n  createEventDispatcher,\n  type EventDispatcher,\n} from '../../extensions/cali-product-workflow/adapters/event-dispatcher.js';\n\ndescribe('Generic Adapter', () => {\n  let adapter: CLIAdapter;\n\n  beforeEach(() => {\n    adapter = createGenericAdapter();\n  });\n\n  it('should have correct name', () => {\n    expect(adapter.name).toBe('generic');\n  });\n\n  it('should return empty commands array', () => {\n    const commands = adapter.registerCommands();\n    expect(Array.isArray(commands)).toBe(true);\n    expect(commands.length).toBe(0);\n  });\n\n  it('should return 4 basic tools with correct names', () => {\n    const tools = adapter.getAvailableTools();\n    expect(tools).toHaveLength(4);\n    const names = tools.map(t => t.name);\n    expect(names).toContain('read');\n    expect(names).toContain('write');\n    expect(names).toContain('bash');\n    expect(names).toContain('edit');\n  });\n\n  it('should format notifications with type prefix', () => {\n    const consoleSpy = vi.spyOn(console, 'log').mockImplementation(() => {});\n    adapter.showNotification('hello', 'info');\n    expect(consoleSpy).toHaveBeenCalledWith('[INFO] hello');\n    consoleSpy.mockRestore();\n  });\n\n  it('should format error notifications with ERROR prefix', () => {\n    const consoleSpy = vi.spyOn(console, 'log').mockImplementation(() => {});\n    adapter.showNotification('fail', 'error');\n    expect(consoleSpy).toHaveBeenCalledWith('[ERROR] fail');\n    consoleSpy.mockRestore();\n  });\n\n  it('should format warning notifications with WARNING prefix', () => {\n    const consoleSpy = vi.spyOn(console, 'log').mockImplementation(() => {});\n    adapter.showNotification('careful', 'warning');\n    expect(consoleSpy).toHaveBeenCalledWith('[WARNING] careful');\n    consoleSpy.mockRestore();\n  });\n\n  it('should format success notifications with SUCCESS prefix', () => {\n    const consoleSpy = vi.spyOn(console, 'log').mockImplementation(() => {});\n    adapter.showNotification('done', 'success');\n    expect(consoleSpy).toHaveBeenCalledWith('[SUCCESS] done');\n    consoleSpy.mockRestore();\n  });\n});\n\ndescribe('Event Dispatcher', () => {\n  let adapter: CLIAdapter;\n  let dispatcher: EventDispatcher;\n\n  beforeEach(() => {\n    adapter = createGenericAdapter();\n    dispatcher = createEventDispatcher(adapter);\n  });\n\n  it('should emit session_start with cwd', () => {\n    const handler = vi.fn();\n    dispatcher.on('session_start', handler);\n    dispatcher.dispatchSessionStart('/test/cwd');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ cwd: '/test/cwd' })\n    );\n  });\n\n  it('should emit tool_call with tool and input', () => {\n    const handler = vi.fn();\n    dispatcher.on('tool_call', handler);\n    dispatcher.dispatchToolCall('read', { path: '/test' }, '/cwd');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ tool: 'read', input: { path: '/test' } })\n    );\n  });\n\n  it('should emit turn_end with cwd', () => {\n    const handler = vi.fn();\n    dispatcher.on('turn_end', handler);\n    dispatcher.dispatchTurnEnd('/cwd');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ cwd: '/cwd' })\n    );\n  });\n\n  it('should emit input with text and sessionId', () => {\n    const handler = vi.fn();\n    dispatcher.on('input', handler);\n    dispatcher.dispatchInput('hello', '/cwd', 'session-1');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ text: 'hello', sessionId: 'session-1' })\n    );\n  });\n\n  it('should emit agent_end with sessionId', () => {\n    const handler = vi.fn();\n    dispatcher.on('agent_end', handler);\n    dispatcher.dispatchAgentEnd('/cwd', 'session-123');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ sessionId: 'session-123' })\n    );\n  });\n\n  it('should unsubscribe handlers', () => {\n    const handler = vi.fn();\n    const unsubscribe = dispatcher.on('session_start', handler);\n    dispatcher.dispatchSessionStart('/test');\n    expect(handler).toHaveBeenCalledTimes(1);\n\n    unsubscribe();\n    dispatcher.dispatchSessionStart('/test2');\n    expect(handler).toHaveBeenCalledTimes(1);\n  });\n\n  it('should support multiple listeners on same event', () => {\n    const handler1 = vi.fn();\n    const handler2 = vi.fn();\n    dispatcher.on('session_start', handler1);\n    dispatcher.on('session_start', handler2);\n    dispatcher.dispatchSessionStart('/test');\n    expect(handler1).toHaveBeenCalledTimes(1);\n    expect(handler2).toHaveBeenCalledTimes(1);\n  });\n\n  it('should clear listeners on dispose', () => {\n    const handler = vi.fn();\n    dispatcher.on('session_start', handler);\n    dispatcher.dispose();\n    dispatcher.dispatchSessionStart('/test');\n    expect(handler).not.toHaveBeenCalled();\n  });\n\n  it('should not throw when handler errors', () => {\n    const consoleSpy = vi.spyOn(console, 'error').mockImplementation(() => {});\n    dispatcher.on('session_start', () => { throw new Error('boom'); });\n    expect(() => dispatcher.dispatchSessionStart('/test')).not.toThrow();\n    expect(consoleSpy).toHaveBeenCalled();\n    consoleSpy.mockRestore();\n  });\n\n  it('should pass cwd in turn_end dispatch', () => {\n    const handler = vi.fn();\n    dispatcher.on('turn_end', handler);\n    dispatcher.dispatchTurnEnd('/my/project');\n    expect(handler).toHaveBeenCalledWith(\n      expect.objectContaining({ cwd: '/my/project' })\n    );\n  });\n});\n"},"tests/unit/modules-task.test.ts":{"tests":[{"id":"130","name":"TaskStatus should be a union type with three values"},{"id":"131","name":"TaskStatus should match TASK_ICONS keys"},{"id":"132","name":"TASK_ICONS should have correct icons for each status"},{"id":"133","name":"TaskItem should accept valid task item"},{"id":"134","name":"TaskItem should accept optional fields"},{"id":"135","name":"PhaseTodo should require id field"},{"id":"136","name":"PhaseTodo should accept all status values"},{"id":"137","name":"PhaseTodo should work with dates"},{"id":"138","name":"PhaseTodosData should hold phase todos structure"},{"id":"139","name":"InboxItem should only require content"},{"id":"140","name":"InboxItem should accept optional source"},{"id":"141","name":"InboxItem should accept optional date"},{"id":"142","name":"formatTask should format task without id"},{"id":"143","name":"formatTask should format task with id"},{"id":"144","name":"formatTask should format completed task"},{"id":"145","name":"formatTaskList should format empty list"},{"id":"146","name":"formatTaskList should format list without header"},{"id":"147","name":"formatTaskList should format list with header"}],"source":"/**\n * Unit tests: Task types and formatters\n * \n * Tests the shared types for task management:\n * - PhaseTodo: Tasks for workflow phases\n * - InboxItem: Deferred items in inbox\n * - TaskStatus: Status enum\n * - Formatting functions\n */\n\nimport { describe, it, expect } from 'vitest';\nimport {\n  TaskStatus,\n  TaskItem,\n  PhaseTodo,\n  PhaseTodosData,\n  InboxItem,\n  TASK_ICONS,\n  formatTask,\n  formatTaskList,\n} from '../../extensions/cali-product-workflow/modules/task';\n\ndescribe('TaskStatus', () => {\n  it('should be a union type with three values', () => {\n    const validateStatus = (s: TaskStatus) => ['pending', 'in_progress', 'completed'].includes(s);\n    expect(validateStatus('pending')).toBe(true);\n    expect(validateStatus('in_progress')).toBe(true);\n    expect(validateStatus('completed')).toBe(true);\n  });\n\n  it('should match TASK_ICONS keys', () => {\n    expect(Object.keys(TASK_ICONS)).toEqual(['pending', 'in_progress', 'completed']);\n  });\n});\n\ndescribe('TASK_ICONS', () => {\n  it('should have correct icons for each status', () => {\n    expect(TASK_ICONS.pending).toBe('○');\n    expect(TASK_ICONS.in_progress).toBe('◐');\n    expect(TASK_ICONS.completed).toBe('✓');\n  });\n});\n\ndescribe('TaskItem', () => {\n  it('should accept valid task item', () => {\n    const item: TaskItem = {\n      content: 'Test task',\n      status: 'pending',\n    };\n    expect(item.content).toBe('Test task');\n    expect(item.status).toBe('pending');\n  });\n\n  it('should accept optional fields', () => {\n    const item: TaskItem = {\n      id: 'optional-id',\n      content: 'Test',\n      status: 'completed',\n      createdAt: '2024-01-01T00:00:00Z',\n      completedAt: '2024-01-02T00:00:00Z',\n    };\n    expect(item.id).toBe('optional-id');\n    expect(item.createdAt).toBe('2024-01-01T00:00:00Z');\n    expect(item.completedAt).toBe('2024-01-02T00:00:00Z');\n  });\n});\n\ndescribe('PhaseTodo', () => {\n  it('should require id field', () => {\n    const todo: PhaseTodo = {\n      id: 'SHAPE-1',\n      content: 'Define the hill',\n      status: 'pending',\n    };\n    expect(todo.id).toBe('SHAPE-1');\n  });\n\n  it('should accept all status values', () => {\n    const todos: PhaseTodo[] = [\n      { id: '1', content: 'p', status: 'pending' },\n      { id: '2', content: 'i', status: 'in_progress' },\n      { id: '3', content: 'c', status: 'completed' },\n    ];\n    expect(todos).toHaveLength(3);\n  });\n\n  it('should work with dates', () => {\n    const todo: PhaseTodo = {\n      id: 'SHAPE-1',\n      content: 'Task with dates',\n      status: 'completed',\n      createdAt: '2024-01-01T00:00:00.000Z',\n      completedAt: '2024-01-02T00:00:00.000Z',\n    };\n    expect(todo.createdAt).toBeDefined();\n    expect(todo.completedAt).toBeDefined();\n  });\n});\n\ndescribe('PhaseTodosData', () => {\n  it('should hold phase todos structure', () => {\n    const data: PhaseTodosData = {\n      workflowName: 'My Workflow',\n      phase: 'SHAPE',\n      phaseIndex: 2,\n      todos: [\n        { id: 'SHAPE-1', content: 'Task 1', status: 'completed' },\n        { id: 'SHAPE-2', content: 'Task 2', status: 'pending' },\n      ],\n      updatedAt: '2024-01-01T00:00:00Z',\n    };\n    expect(data.workflowName).toBe('My Workflow');\n    expect(data.todos).toHaveLength(2);\n  });\n});\n\ndescribe('InboxItem', () => {\n  it('should only require content', () => {\n    const item: InboxItem = { content: 'Remember to do this' };\n    expect(item.content).toBe('Remember to do this');\n  });\n\n  it('should accept optional source', () => {\n    const item: InboxItem = {\n      content: 'Feature idea',\n      source: 'triage',\n    };\n    expect(item.source).toBe('triage');\n  });\n\n  it('should accept optional date', () => {\n    const item: InboxItem = {\n      content: 'Backlog item',\n      addedAt: '2024-01-01T00:00:00Z',\n    };\n    expect(item.addedAt).toBe('2024-01-01T00:00:00Z');\n  });\n});\n\ndescribe('formatTask', () => {\n  it('should format task without id', () => {\n    const task: TaskItem = {\n      content: 'Simple task',\n      status: 'pending',\n    };\n    expect(formatTask(task)).toBe('○ Simple task');\n  });\n\n  it('should format task with id', () => {\n    const task: PhaseTodo = {\n      id: 'SHAPE-1',\n      content: 'Define the hill',\n      status: 'in_progress',\n    };\n    expect(formatTask(task)).toBe('◐ [SHAPE-1] Define the hill');\n  });\n\n  it('should format completed task', () => {\n    const task: PhaseTodo = {\n      id: 'SCOPE-3',\n      content: 'Done task',\n      status: 'completed',\n    };\n    expect(formatTask(task)).toBe('✓ [SCOPE-3] Done task');\n  });\n});\n\ndescribe('formatTaskList', () => {\n  it('should format empty list', () => {\n    expect(formatTaskList([])).toBe('');\n  });\n\n  it('should format list without header', () => {\n    const tasks: PhaseTodo[] = [\n      { id: '1', content: 'Task 1', status: 'pending' },\n      { id: '2', content: 'Task 2', status: 'completed' },\n    ];\n    expect(formatTaskList(tasks)).toBe('○ [1] Task 1\\n✓ [2] Task 2');\n  });\n\n  it('should format list with header', () => {\n    const tasks: PhaseTodo[] = [\n      { id: '1', content: 'Task 1', status: 'pending' },\n    ];\n    const result = formatTaskList(tasks, 'SHAPE Phase Tasks:');\n    expect(result).toBe('SHAPE Phase Tasks:\\n\\n○ [1] Task 1');\n  });\n});"},"tests/unit/stages-guard.test.ts":{"tests":[{"id":"148","name":"Stages Guard blocks tools in triage blocked list"},{"id":"149","name":"Stages Guard allows tools not in triage blocked list"},{"id":"150","name":"Stages Guard returns allowedTools in rejection reason"},{"id":"151","name":"Stages Guard allows all tools in execution stage"},{"id":"152","name":"Stages Guard blocks tools in gate stage"},{"id":"153","name":"Stages Guard falls back to allowed=true for unknown stage"},{"id":"154","name":"Stages Guard handles empty state gracefully"},{"id":"155","name":"Stages Guard provides descriptive rejection reason"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { parse as parseYAML } from \"yaml\";\n\n// Type-only imports for tests (we test the standalone functions)\nimport type { Stage, StagesConfig, StageState } from \"../../types/stages\";\n\n// Helper: parse YAML inline for testing\nfunction parseStages(content: string): StagesConfig {\n  return parseYAML(content) as StagesConfig;\n}\n\n// The guard logic (simplified for test — mirrors stages-guard.ts)\ninterface GuardResult {\n  allowed: boolean;\n  reason?: string;\n  allowedTools?: string[];\n}\n\nfunction createTestGuard(stages: StagesConfig, state: StageState) {\n  const stageMap = new Map<"+"string, Stage>();\n  for (const s of stages.stages) {\n    stageMap.set(s.name, s);\n  }\n\n  return function checkTool(toolName: string): GuardResult {\n    const stageName = state.current_stage;\n    const stage = stageMap.get(stageName);\n\n    if (!stage) {\n      return { allowed: true };\n    }\n\n    if (stage.blocked_tools.includes(toolName)) {\n      return {\n        allowed: false,\n        reason: `Tool '${toolName}' is blocked in '${stageName}' stage`,\n        allowedTools: stage.allowed_tools,\n      };\n    }\n\n    return { allowed: true };\n  };\n}\n\nconst stagesYAML = `\nstages:\n  - name: triage\n    order: 10\n    blocked_tools: [edit, write, bash, subagent, agent_browser]\n    allowed_tools: [ask, read, grep, ls]\n    transitions:\n      next: [setup]\n  - name: execution\n    order: 120\n    blocked_tools: []\n    allowed_tools: [edit, write, bash, read, grep, ls]\n    supervisor: true\n    transitions:\n      next: [audit]\n  - name: gate\n    order: 60\n    blocked_tools: [edit, write, bash, subagent, agent_browser]\n    allowed_tools: [read, ls, grep, ask]\n    requires_approval: true\n    transitions:\n      next: [execution]\n`;\n\nconst stages = parseStages(stagesYAML);\n\nconst triageState: StageState = {\n  current_stage: \"triage\",\n  previous_stage: null,\n  transitioned_at: \"2026-05-26T10:00:00Z\",\n  history: [{ stage: \"triage\", entered_at: \"2026-05-26T10:00:00Z\", exited_at: null }],\n  gates_passed: [],\n  supervisor_active: false,\n};\n\nconst executionState: StageState = {\n  current_stage: \"execution\",\n  previous_stage: \"gate\",\n  transitioned_at: \"2026-05-26T10:30:00Z\",\n  history: [\n    { stage: \"triage\", entered_at: \"2026-05-26T10:00:00Z\", exited_at: \"2026-05-26T10:05:00Z\" },\n    { stage: \"execution\", entered_at: \"2026-05-26T10:30:00Z\", exited_at: null },\n  ],\n  gates_passed: [\"gate\"],\n  supervisor_active: true,\n};\n\ndescribe(\"Stages Guard\", () => {\n  it(\"blocks tools in triage blocked list\", () => {\n    const guard = createTestGuard(stages, triageState);\n    expect(guard(\"edit\").allowed).toBe(false);\n    expect(guard(\"write\").allowed).toBe(false);\n    expect(guard(\"bash\").allowed).toBe(false);\n    expect(guard(\"subagent\").allowed).toBe(false);\n    expect(guard(\"agent_browser\").allowed).toBe(false);\n  });\n\n  it(\"allows tools not in triage blocked list\", () => {\n    const guard = createTestGuard(stages, triageState);\n    expect(guard(\"ask\").allowed).toBe(true);\n    expect(guard(\"read\").allowed).toBe(true);\n    expect(guard(\"grep\").allowed).toBe(true);\n  });\n\n  it(\"returns allowedTools in rejection reason\", () => {\n    const guard = createTestGuard(stages, triageState);\n    const result = guard(\"bash\");\n    expect(result.allowed).toBe(false);\n    expect(result.allowedTools).toEqual([\"ask\", \"read\", \"grep\", \"ls\"]);\n  });\n\n  it(\"allows all tools in execution stage\", () => {\n    const guard = createTestGuard(stages, executionState);\n    expect(guard(\"edit\").allowed).toBe(true);\n    expect(guard(\"bash\").allowed).toBe(true);\n    expect(guard(\"write\").allowed).toBe(true);\n    expect(guard(\"agent_browser\").allowed).toBe(true);\n  });\n\n  it(\"blocks tools in gate stage\", () => {\n    const gateState: StageState = {\n      current_stage: \"gate\",\n      previous_stage: null,\n      transitioned_at: \"2026-05-26T10:20:00Z\",\n      history: [],\n      gates_passed: [],\n      supervisor_active: false,\n    };\n    const guard = createTestGuard(stages, gateState);\n    expect(guard(\"edit\").allowed).toBe(false);\n    expect(guard(\"bash\").allowed).toBe(false);\n    expect(guard(\"subagent\").allowed).toBe(false);\n    expect(guard(\"read\").allowed).toBe(true);\n    expect(guard(\"grep\").allowed).toBe(true);\n  });\n\n  it(\"falls back to allowed=true for unknown stage\", () => {\n    const unknownState: StageState = {\n      current_stage: \"unknown\",\n      previous_stage: null,\n      transitioned_at: \"2026-05-26T10:00:00Z\",\n      history: [],\n      gates_passed: [],\n      supervisor_active: false,\n    };\n    const guard = createTestGuard(stages, unknownState);\n    expect(guard(\"bash\").allowed).toBe(true);\n  });\n\n  it(\"handles empty state gracefully\", () => {\n    const emptyState: StageState = {\n      current_stage: \"\",\n      previous_stage: null,\n      transitioned_at: \"\",\n      history: [],\n      gates_passed: [],\n      supervisor_active: false,\n    };\n    // Guard returns true for unknown stage (fallback)\n    const guard = createTestGuard(stages, emptyState);\n    expect(guard(\"bash\").allowed).toBe(true);\n  });\n\n  it(\"provides descriptive rejection reason\", () => {\n    const guard = createTestGuard(stages, triageState);\n    const result = guard(\"edit\");\n    expect(result.reason).toMatch(/Tool 'edit' is blocked in 'triage' stage/);\n  });\n});\n"}},"projectRoot":"/Users/cali/Development/cali-product-workflow","config":{"$schema":"./node_modules/@stryker-mutator/core/schema/stryker-schema.json","_comment":"Mutation testing config - 70/50/30 thresholds","testRunner":"vitest","coverageAnalysis":"all","vitest":{"configFile":"vitest.mutate.config.ts","related":false},"thresholds":{"high":70,"low":50,"break":50},"mutate":["extensions/cali-product-workflow/adapters/{base,cli-adapter,event-dispatc
