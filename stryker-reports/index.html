ic":false,"coveredBy":[],"location":{"end":{"column":41,"line":378},"start":{"column":22,"line":378}}},{"id":"415","mutatorName":"BooleanLiteral","replacement":"false","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":39,"line":378},"start":{"column":35,"line":378}}},{"id":"416","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":49,"line":381},"start":{"column":43,"line":381}}},{"id":"417","mutatorName":"StringLiteral","replacement":"``","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":66,"line":382},"start":{"column":17,"line":382}}}],"source":"/**\n * Command Dispatcher\n * \n * Routes command registration to the appropriate CLI-specific handler.\n * Provides a unified interface for all CLI command systems.\n */\n\nimport type { CLI, CLICapabilities } from \"../../types\";\nimport { detectCLI } from \"../../state\";\n\nexport interface CommandDescriptor {\n  /** Command name with kebab-case prefix (e.g., \"pw-start\") */\n  name: string;\n  /** Command description for help */\n  description: string;\n  /** Usage example */\n  usage?: string;\n  /** True if this command requires the Pi extension (TUI, state hooks, etc.) */\n  piOnly?: boolean;\n}\n\n/**\n * All workflow commands with their metadata.\n */\nexport const WORKFLOW_COMMANDS: CommandDescriptor[] = [\n  {\n    name: \"pw-start\",\n    description: \"Start a new product workflow\",\n    usage: \"/pw-start [name=...] [description=...] [@file]\",\n  },\n  {\n    name: \"pw-stop\",\n    description: \"Stop workflow(s)\",\n    usage: \"/pw-stop | all | name1 name2\",\n  },\n  {\n    name: \"pw-pause\",\n    description: \"Pause active workflow\",\n    usage: \"/pw-pause\",\n  },\n  {\n    name: \"pw-resume\",\n    description: \"Resume paused workflow\",\n    usage: \"/pw-resume [name=name]\",\n  },\n  {\n    name: \"pw-status\",\n    description: \"Show active workflow status\",\n    usage: \"/pw-status\",\n  },\n  {\n    name: \"pw-ls\",\n    description: \"List workflows\",\n    usage: \"/pw-ls | all | archived | path=DIR\",\n  },\n  {\n    name: \"pw-setphase\",\n    description: \"Jump to phase\",\n    usage: \"/pw-setphase phase=N | phasename=Name\",\n  },\n  {\n    name: \"pw-next\",\n    description: \"Advance to next phase\",\n    usage: \"/pw-next\",\n  },\n  {\n    name: \"pw-complete\",\n    description: \"Mark active workflow complete\",\n    usage: \"/pw-complete\",\n  },\n  {\n    name: \"pw-goto\",\n    description: \"Go to a workflow\",\n    usage: \"/pw-goto [name=name]\",\n  },\n  {\n    name: \"pw-rename\",\n    description: \"Rename active workflow\",\n    usage: \"/pw-rename novo-nome | name=novo-nome\",\n  },\n  {\n    name: \"pw-menu\",\n    description: \"Open workflow overview overlay\",\n    usage: \"/pw-menu\",\n  },\n  {\n    name: \"pw-archive\",\n    description: \"Archive workflows\",\n    usage: \"/pw-archive | /pw-archive name=X | /pw-archive purge\",\n  },\n  {\n    name: \"pw-unarchive\",\n    description: \"Unarchive a workflow\",\n    usage: \"/pw-unarchive name=<"+"workflow>\",\n  },\n  {\n    name: \"pw-todo\",\n    description: \"Manage phase todos\",\n    usage: \"/pw-todo | add <"+"task> | complete <"+"id>\",\n    piOnly: true,\n  },\n  {\n    name: \"pw-inbox\",\n    description: \"Manage workflow inbox\",\n    usage: \"/pw-inbox | add <"+"text> | remove <"+"text> | clear\",\n    piOnly: true,\n  },\n];\n\n/**\n * Command registration system interface.\n * Each CLI implements this to provide command registration.\n */\nexport interface CommandRegistrationSystem {\n  /** Get CLI identifier */\n  readonly cli: CLI;\n  \n  /** Check if this CLI supports native command registration */\n  supportsNativeCommands(): boolean;\n  \n  /**\n   * Register all workflow commands.\n   * Returns list of successfully registered commands.\n   */\n  registerAll(): CommandDescriptor[];\n  \n  /**\n   * Register a single command.\n   */\n  registerOne(descriptor: CommandDescriptor): boolean;\n  \n  /**\n   * Get the command prefix for this CLI.\n   * e.g., \"/\" for slash commands.\n   */\n  getCommandPrefix(): string;\n  \n  /**\n   * Generate command files for CLIs that use file-based commands.\n   * Returns array of {path, content} for files to create.\n   */\n  generateCommandFiles(): Array<"+"{ path: string; content: string }>;\n}\n\n/**\n * Get the appropriate command registration system for the current CLI.\n */\nexport function getCommandSystem(cli?: CLI): CommandRegistrationSystem {\n  const detected = cli || detectCLI();\n  \n  switch (detected) {\n    case \"pi\":\n      return getPiCommandSystem();\n    case \"opencode\":\n      return getOpenCodeCommandSystem();\n    case \"claude-code\":\n      return getClaudeCodeCommandSystem();\n    case \"codex\":\n      return getCodexCommandSystem();\n    default:\n      return getGenericCommandSystem();\n  }\n}\n\n// ── Pi Command System ─────────────────────────────────────────────────\n\nfunction getPiCommandSystem(): CommandRegistrationSystem {\n  return {\n    cli: \"pi\" as CLI,\n    \n    supportsNativeCommands(): boolean {\n      return true;\n    },\n    \n    registerAll(): CommandDescriptor[] {\n      // Pi uses native command registration via ExtensionAPI\n      // This is handled in commands.ts with pi.registerCommand()\n      return WORKFLOW_COMMANDS;\n    },\n    \n    registerOne(descriptor: CommandDescriptor): boolean {\n      // Pi handles this via registerCommands() in commands.ts\n      return true;\n    },\n    \n    getCommandPrefix(): string {\n      return \"/\";\n    },\n    \n    generateCommandFiles(): Array<"+"{ path: string; content: string }> {\n      // Pi doesn't use file-based commands\n      return [];\n    },\n  };\n}\n\n// ── OpenCode Command System ───────────────────────────────────────────\n\nfunction getOpenCodeCommandSystem(): CommandRegistrationSystem {\n  return {\n    cli: \"opencode\" as CLI,\n    \n    supportsNativeCommands(): boolean {\n      return false; // OpenCode uses skill files\n    },\n    \n    registerAll(): CommandDescriptor[] {\n      // OpenCode uses skills/ directory\n      return WORKFLOW_COMMANDS;\n    },\n    \n    registerOne(_descriptor: CommandDescriptor): boolean {\n      // Commands are file-based\n      return true;\n    },\n    \n    getCommandPrefix(): string {\n      return \"/\";\n    },\n    \n    generateCommandFiles(): Array<"+"{ path: string; content: string }> {\n      return WORKFLOW_COMMANDS.map(cmd => ({\n        path: `skills/${cmd.name}.md`,\n        content: generateOpenCodeSkillFile(cmd),\n      }));\n    },\n  };\n}\n\nfunction generateOpenCodeSkillFile(cmd: CommandDescriptor): string {\n  return `---\nname: ${cmd.name}\ndescription: ${cmd.description}\n---\n\n// Usage: ${cmd.usage || cmd.description}\n\n/skill:cali-product-workflow\n\n// Command: ${cmd.name}\n// This skill delegates to the product-workflow skill\n${cmd.name} {args}\n`;\n}\n\n// ── Claude Code Command System ────────────────────────────────────────\n\nfunction getClaudeCodeCommandSystem(): CommandRegistrationSystem {\n  return {\n    cli: \"claude-code\" as CLI,\n    \n    supportsNativeCommands(): boolean {\n      return false; // Claude Code uses skills/\n    },\n    \n    registerAll(): CommandDescriptor[] {\n      return WORKFLOW_COMMANDS;\n    },\n    \n    registerOne(_descriptor: CommandDescriptor): boolean {\n      return true;\n    },\n    \n    getCommandPrefix(): string {\n      return \"/\";\n    },\n    \n    generateCommandFiles(): Array<"+"{ path: string; content: string }> {\n      return WORKFLOW_COMMANDS.map(cmd => ({\n        path: `skills/${cmd.name}.md`,\n        content: generateClaudeCodeSkillFile(cmd),\n      }));\n    },\n  };\n}\n\nfunction generateClaudeCodeSkillFile(cmd: CommandDescriptor): string {\n  return `---\nname: ${cmd.name}\ndescription: ${cmd.description}\n---\n\n// Usage: ${cmd.usage || cmd.description}\n${cmd.name} {args}\n`;\n}\n\n// ── Codex Command System ──────────────────────────────────────────────\n\nfunction getCodexCommandSystem(): CommandRegistrationSystem {\n  return {\n    cli: \"codex\" as CLI,\n    \n    supportsNativeCommands(): boolean {\n      return false; // Codex uses commands/ directory\n    },\n    \n    registerAll(): CommandDescriptor[] {\n      return WORKFLOW_COMMANDS;\n    },\n    \n    registerOne(_descriptor: CommandDescriptor): boolean {\n      return true;\n    },\n    \n    getCommandPrefix(): string {\n      return \"/\";\n    },\n    \n    generateCommandFiles(): Array<"+"{ path: string; content: string }> {\n      return WORKFLOW_COMMANDS.map(cmd => ({\n        path: `commands/${cmd.name}.md`,\n        content: generateCodexCommandFile(cmd),\n      }));\n    },\n  };\n}\n\nfunction generateCodexCommandFile(cmd: CommandDescriptor): string {\n  return `---\nname: ${cmd.name}\ndescription: ${cmd.description}\n---\n\n@agent\n// Usage: ${cmd.usage || cmd.description}\n${cmd.name} {args}\n`;\n}\n\n// ── Generic Command System (Fallback) ─────────────────────────────────\n\nfunction getGenericCommandSystem(): CommandRegistrationSystem {\n  return {\n    cli: \"generic\" as CLI,\n    \n    supportsNativeCommands(): boolean {\n      return false;\n    },\n    \n    registerAll(): CommandDescriptor[] {\n      // No commands registered in generic mode\n      return [];\n    },\n    \n    registerOne(_descriptor: CommandDescriptor): boolean {\n      return false;\n    },\n    \n    getCommandPrefix(): string {\n      return \"/\";\n    },\n    \n    generateCommandFiles(): Array<"+"{ path: string; content: string }> {\n      return [];\n    },\n  };\n}\n\n/**\n * Write command files to disk for CLI-specific command systems.\n * Call this during installation or first-run setup.\n * \n * @param baseDir - Base directory to write command files\n * @param cli - Target CLI (defaults to detected)\n */\nexport function installCommandFiles(baseDir: string, cli?: CLI): void {\n  const { writeFileSync, mkdirSync, existsSync } = require(\"node:fs\");\n  \n  const system = getCommandSystem(cli);\n  const files = system.generateCommandFiles();\n  \n  for (const file of files) {\n    const fullPath = `${baseDir}/${file.path}`;\n    const dir = fullPath.substring(0, fullPath.lastIndexOf(\"/\"));\n    \n    if (!existsSync(dir)) {\n      mkdirSync(dir, { recursive: true });\n    }\n    \n    writeFileSync(fullPath, file.content, \"utf8\");\n    console.log(`[cali-product-workflow] Installed: ${file.path}`);\n  }\n}"},"extensions/cali-product-workflow/adapters/event-dispatcher.ts":{"language":"typescript","mutants":[{"id":"420","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":84},"start":{"column":64,"line":82}}},{"id":"421","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":29,"line":83},"start":{"column":18,"line":83}}},{"id":"422","mutatorName":"ObjectLiteral","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":46,"line":83},"start":{"column":31,"line":83}}},{"id":"423","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":89},"start":{"column":51,"line":87}}},{"id":"424","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":33,"line":88},"start":{"column":18,"line":88}}},{"id":"425","mutatorName":"ObjectLiteral","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":42,"line":88},"start":{"column":35,"line":88}}},{"id":"426","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":94},"start":{"column":7  | \"agent_end\"\n  | \"pre_compact\";\n\n/**\n * Event data for session_start.\n */\nexport interface SessionStartEvent {\n  cwd: string;\n  sessionId?: string;\n}\n\n/**\n * Event data for tool_call.\n */\nexport interface ToolCallEvent {\n  tool: string;\n  input?: unknown;\n  cwd: string;\n}\n\n/**\n * Event data for turn_end.\n */\nexport interface TurnEndEvent {\n  cwd: string;\n  sessionId?: string;\n}\n\n/**\n * Event data for input.\n */\nexport interface InputEvent {\n  text: string;\n  cwd: string;\n  sessionId?: string;\n}\n\n/**\n * Event data for agent_end.\n */\nexport interface AgentEndEvent {\n  cwd: string;\n  sessionId?: string;\n}\n\n/**\n * Unified event dispatcher for all CLI adapters.\n * Provides a consistent interface for dispatching events.\n */\nexport class EventDispatcher {\n  private _adapter: CLIAdapter;\n  private _listeners: Map<"+"EventType, Set<"+"(...args: unknown[]) => void>> = new Map();\n  \n  constructor(adapter: CLIAdapter) {\n    this._adapter = adapter;\n    this._registerAdapterHandlers();\n  }\n  \n  /**\n   * Register adapter's handlers for events.\n   * This wires the adapter to the dispatcher.\n   */\n  private _registerAdapterHandlers(): void {\n    // Tool call events\n    this._adapter.onToolCall((tool: string, input: unknown) => {\n      this._emit(\"tool_call\", { tool, input });\n    });\n    \n    // Session start events\n    this._adapter.onSessionStart((cwd: string) => {\n      this._emit(\"session_start\", { cwd });\n    });\n    \n    // Turn end events\n    this._adapter.onTurnEnd((ctx: { cwd: string; sessionId?: string }) => {\n      this._emit(\"turn_end\", ctx);\n    });\n    \n    // Input events\n    this._adapter.onInput((text: string, ctx: { cwd: string; sessionId?: string }) => {\n      this._emit(\"input\", { text, ...ctx });\n    });\n  }\n  \n  /**\n   * Subscribe to an event type.\n   * @param type - Event type to subscribe to\n   * @param handler - Callback function\n   * @returns Unsubscribe function\n   */\n  on(type: EventType, handler: (...args: unknown[]) => void): () => void {\n    if (!this._listeners.has(type)) {\n      this._listeners.set(type, new Set());\n    }\n    this._listeners.get(type)!.add(handler);\n    \n    // Return unsubscribe function\n    return () => {\n      this._listeners.get(type)?.delete(handler);\n    };\n  }\n  \n  /**\n   * Emit an event to all listeners.\n   * @param type - Event type\n   * @param data - Event data\n   */\n  private _emit(type: EventType, data: unknown): void {\n    const listeners = this._listeners.get(type);\n    if (listeners) {\n      for (const listener of listeners) {\n        try {\n          listener(data);\n        } catch (err) {\n          console.error(`[EventDispatcher] Error in ${type} handler:`, err);\n        }\n      }\n    }\n  }\n  \n  /**\n   * Dispatch a session_start event.\n   */\n  dispatchSessionStart(cwd: string, sessionId?: string): void {\n    this._emit(\"session_start\", { cwd, sessionId });\n  }\n  \n  /**\n   * Dispatch a tool_call event.\n   */\n  dispatchToolCall(tool: string, input: unknown, cwd: string): void {\n    this._emit(\"tool_call\", { tool, input, cwd });\n  }\n  \n  /**\n   * Dispatch a turn_end event.\n   */\n  dispatchTurnEnd(cwd: string, sessionId?: string): void {\n    this._emit(\"turn_end\", { cwd, sessionId });\n  }\n  \n  /**\n   * Dispatch an input event.\n   */\n  dispatchInput(text: string, cwd: string, sessionId?: string): void {\n    this._emit(\"input\", { text, cwd, sessionId });\n  }\n  \n  /**\n   * Dispatch an agent_end event.\n   */\n  dispatchAgentEnd(cwd: string, sessionId?: string): void {\n    this._emit(\"agent_end\", { cwd, sessionId });\n  }\n  \n  /**\n   * Get the adapter this dispatcher uses.\n   */\n  get adapter(): CLIAdapter {\n    return this._adapter;\n  }\n  \n  /**\n   * Dispose of the dispatcher.\n   */\n  dispose(): void {\n    this._listeners.clear();\n  }\n}\n\n/**\n * Create an event dispatcher for a CLI adapter.\n * \n * @param adapter - CLI adapter instance\n * @returns EventDispatcher instance\n */\nexport function createEventDispatcher(adapter: CLIAdapter): EventDispatcher {\n  return new EventDispatcher(adapter);\n}"},"extensions/cali-product-workflow/adapters/generic.ts":{"language":"typescript","mutants":[{"id":"466","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":27},"start":{"column":57,"line":25}}},{"id":"467","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":35},"start":{"column":30,"line":33}}},{"id":"468","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":40},"start":{"column":22,"line":37}}},{"id":"469","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":94,"line":38},"start":{"column":17,"line":38}}},{"id":"486","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":92,"line":58},"start":{"column":86,"line":58}}},{"id":"465","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":false,"testsCompleted":17,"coveredBy":["113","114","115","116","117","118","119","120","121","122","123","124","125","126","127","128","129"],"location":{"end":{"column":20,"line":19},"start":{"column":11,"line":19}}},{"id":"471","mutatorName":"ArrayDeclaration","replacement":"[\"Stryker was here\"]","statusReason":"expected 1 to be +0 // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["114"],"coveredBy":["114"],"location":{"end":{"column":14,"line":45},"start":{"column":12,"line":45}}},{"id":"470","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected false to be true // Object.is equality","sta ement":"info.level !== \"warning\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":42,"line":207},"start":{"column":18,"line":207}}},{"id":"580","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":42,"line":207},"start":{"column":33,"line":207}}},{"id":"581","mutatorName":"StringLiteral","replacement":"``","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":58,"line":210},"start":{"column":21,"line":210}}}],"source":"/**\n * UI Adapter Interface\n * \n * Abstract interface for UI operations across different CLI environments.\n * Each CLI implements this interface to provide consistent UI capabilities\n * with graceful fallback to terminal output.\n */\n\nimport type { NotificationType, SelectOption, StatusInfo } from \"./cli-adapter\";\n\n// ── UI Adapter Interface ──────────────────────────────────────────────\n\n/**\n * UI Adapter interface for cross-CLI UI operations.\n * Provides notifications, select lists, and status lines with fallbacks.\n */\nexport interface UIAdapter {\n  /** CLI name for logging purposes */\n  readonly cliName: string;\n  \n  // ── Notifications ─────────────────────────────────────────────────\n  \n  /**\n   * Show a notification to the user.\n   * @param message - Notification text\n   * @param type - Notification type (info, warning, error, success)\n   */\n  notify(message: string, type?: NotificationType): void;\n  \n  // ── Select Lists ──────────────────────────────────────────────────\n  \n  /**\n   * Show a select list and return the selected value.\n   * @param options - Array of select options\n   * @param title - Optional title for the select list\n   * @returns Selected value or null if cancelled\n   */\n  select(options: SelectOption[], title?: string): Promise<"+"string | null>;\n  \n  // ── Status Line ──────────────────────────────────────────────────\n  \n  /**\n   * Update the status line.\n   * @param info - Status information\n   */\n  setStatus(info: StatusInfo): void;\n  \n  /**\n   * Clear the status line.\n   */\n  clearStatus(): void;\n  \n  // ── Fallback Detection ────────────────────────────────────────────\n  \n  /**\n   * Get the UI capability level for this environment.\n   * Used to determine fallback behavior.\n   */\n  getCapabilityLevel(): \"native\" | \"ansi\" | \"plain\" | \"silent\";\n}\n\n// ── Fallback Detection ────────────────────────────────────────────────\n\nexport type UIFallbackLevel = \"native\" | \"ansi\" | \"plain\" | \"silent\";\n\n/**\n * Detect the UI fallback level based on environment.\n * Higher levels are preferred (native > ansi > plain > silent).\n */\nexport function detectUIFallbackLevel(): UIFallbackLevel {\n  // Check for NO_COLOR environment variable\n  if (typeof process !== \"undefined\" && process.env?.NO_COLOR === \"1\") {\n    return \"plain\";\n  }\n  \n  // Check for dumb terminal\n  if (typeof process !== \"undefined\" && process.env?.TERM === \"dumb\") {\n    return \"plain\";\n  }\n  \n  // Check if we can write to stdout\n  if (typeof process !== \"undefined\" && process.stdout) {\n    // If stdout is a TTY, we can use ANSI\n    if (process.stdout.isTTY) {\n      return \"ansi\";\n    }\n    // If stdout is not a TTY but exists, we can still use plain output\n    return \"plain\";\n  }\n  \n  // Silent fallback for environments without stdout\n  return \"silent\";\n}\n\n// ── ANSI Color Utilities ─────────────────────────────────────────────\n\n/**\n * ANSI color codes for terminal output.\n */\nexport const AnsiColors = {\n  reset: \"\\x1b[0m\",\n  bold: \"\\x1b[1m\",\n  dim: \"\\x1b[2m\",\n  \n  // Foreground colors\n  black: \"\\x1b[30m\",\n  red: \"\\x1b[31m\",\n  green: \"\\x1b[32m\",\n  yellow: \"\\x1b[33m\",\n  blue: \"\\x1b[34m\",\n  magenta: \"\\x1b[35m\",\n  cyan: \"\\x1b[36m\",\n  white: \"\\x1b[37m\",\n  \n  // Bright foreground colors\n  brightBlack: \"\\x1b[90m\",\n  brightRed: \"\\x1b[91m\",\n  brightGreen: \"\\x1b[92m\",\n  brightYellow: \"\\x1b[93m\",\n  brightBlue: \"\\x1b[94m\",\n  brightMagenta: \"\\x1b[95m\",\n  brightCyan: \"\\x1b[96m\",\n  brightWhite: \"\\x1b[97m\",\n  \n  // Notification type colors\n  info: \"\\x1b[36m\",     // cyan\n  success: \"\\x1b[32m\",  // green\n  warning: \"\\x1b[33m\",  // yellow\n  error: \"\\x1b[31m\",   // red\n} as const;\n\n/**\n * Map notification type to ANSI color.\n */\nexport function getNotificationColor(type: NotificationType): string {\n  return AnsiColors[type] || AnsiColors.info;\n}\n\n/**\n * Format a notification message with ANSI colors.\n */\nexport function formatAnsiNotification(\n  message: string,\n  type: NotificationType\n): string {\n  const color = getNotificationColor(type);\n  return `${color}[${type.toUpperCase()}]${AnsiColors.reset} ${message}`;\n}\n\n/**\n * Get ANSI prefix for a foreground color.\n */\nexport function fg(color: string, text: string): string {\n  const ansiCode = AnsiColors[color as keyof typeof AnsiColors] || \"\";\n  if (!ansiCode) return text;\n  return `${ansiCode}${text}${AnsiColors.reset}`;\n}\n\n/**\n * Truncate text to fit in a width with ellipsis.\n */\nexport function truncate(text: string, maxWidth: number): string {\n  if (text.length <"+"= maxWidth) return text;\n  return text.slice(0, Math.max(0, maxWidth - 3)) + \"...\";\n}\n\n// ── Select List Formatter ─────────────────────────────────────────────\n\n/**\n * Format select options for terminal display.\n */\nexport function formatSelectList(\n  options: SelectOption[],\n  title?: string,\n  maxWidth = 80\n): string {\n  const lines: string[] = [];\n  \n  // Title\n  if (title) {\n    lines.push(`${AnsiColors.bold}${AnsiColors.cyan}◆ ${title}${AnsiColors.reset}`);\n  }\n  \n  // Options\n  options.forEach((opt, i) => {\n    const prefix = `${AnsiColors.dim}[${i + 1}]${AnsiColors.reset}`;\n    const label = opt.label;\n    const desc = opt.description ? ` ${AnsiColors.dim}- ${opt.des rue","status":"Survived","static":false,"testsCompleted":3,"coveredBy":["79","80","81"],"location":{"end":{"column":24,"line":165},"start":{"column":7,"line":165}}}],"source":"/**\n * FileStore - Generic file-based persistence\n * \n * Provides a simple interface for reading/writing files.\n * Handles directory creation and file operations.\n * \n * Usage:\n *   const store = new TextFileStore(cwd, '.cali-product-workflow/inbox/items.md');\n *   store.read();           // returns string\n *   store.write('content'); // writes to file\n */\n\nimport { existsSync, readFileSync, writeFileSync, mkdirSync } from \"node:fs\";\nimport { dirname } from \"node:path\";\n\n/**\n * Base file store interface.\n */\nexport interface IFileStore<"+"T> {\n  read(): T | null;\n  write(data: T): void;\n  path(): string;\n  exists(): boolean;\n}\n\n/**\n * TextFileStore - Read/write plain text files\n */\nexport class TextFileStore implements IFileStore<"+"string> {\n  constructor(\n    private readonly basePath: string,\n    private readonly encoder: (data: string) => string = (s) => s,\n    private readonly decoder: (data: string) => string = (s) => s\n  ) {}\n\n  path(): string {\n    return this.basePath;\n  }\n\n  exists(): boolean {\n    return existsSync(this.basePath);\n  }\n\n  read(): string | null {\n    if (!this.exists()) return null;\n    try {\n      const raw = readFileSync(this.basePath, \"utf-8\");\n      return this.decoder(raw);\n    } catch {\n      return null;\n    }\n  }\n\n  write(data: string): void {\n    const dir = dirname(this.basePath);\n    if (!existsSync(dir)) {\n      mkdirSync(dir, { recursive: true });\n    }\n    writeFileSync(this.basePath, this.encoder(data), \"utf-8\");\n  }\n\n  delete(): void {\n    // Not implemented for safety\n  }\n}\n\n/**\n * JsonFileStore - Read/write JSON files\n */\nexport class JsonFileStore<"+"T extends object = object> implements IFileStore<"+"T> {\n  constructor(\n    private readonly basePath: string,\n    private readonly replacer?: (key: string, value: unknown) => unknown,\n    private readonly reviver?: (key: string, value: unknown) => unknown\n  ) {}\n\n  path(): string {\n    return this.basePath;\n  }\n\n  exists(): boolean {\n    return existsSync(this.basePath);\n  }\n\n  read(): T | null {\n    if (!this.exists()) return null;\n    try {\n      const content = readFileSync(this.basePath, \"utf-8\");\n      return JSON.parse(content, this.reviver) as T;\n    } catch {\n      return null;\n    }\n  }\n\n  write(data: T): void {\n    const dir = dirname(this.basePath);\n    if (!existsSync(dir)) {\n      mkdirSync(dir, { recursive: true });\n    }\n    writeFileSync(this.basePath, JSON.stringify(data, this.replacer, 2), \"utf-8\");\n  }\n\n  delete(): void {\n    // Not implemented for safety\n  }\n}\n\n/**\n * MarkdownFileStore - Read/write markdown files with header support\n */\nexport class MarkdownFileStore implements IFileStore<"+"string[]> {\n  constructor(\n    private readonly basePath: string,\n    private readonly headerLine: string = \"# Items\"\n  ) {}\n\n  path(): string {\n    return this.basePath;\n  }\n\n  exists(): boolean {\n    return existsSync(this.basePath);\n  }\n\n  /**\n   * Read items from markdown file.\n   * Skips header line and empty lines.\n   */\n  read(): string[] {\n    if (!this.exists()) return [];\n    try {\n      const content = readFileSync(this.basePath, \"utf-8\");\n      return content\n        .split(\"\\n\")\n        .map(line => line.trim())\n        .filter(line => line.length > 0)\n        .filter(line => !line.startsWith(\"#\"));\n    } catch {\n      return [];\n    }\n  }\n\n  /**\n   * Write items to markdown file with header.\n   */\n  write(items: string[]): void {\n    const dir = dirname(this.basePath);\n    if (!existsSync(dir)) {\n      mkdirSync(dir, { recursive: true });\n    }\n    const header = `${this.headerLine}\\n\\n`;\n    const content = items.length > 0 ? items.join(\"\\n\") + \"\\n\" : \"\\n\";\n e.\n   */\n  set(data: T): void {\n    this._data = data;\n    if (this._saveToFile) {\n      this._saveToFile(data);\n    }\n  }\n\n  /**\n   * Clear cache and optionally file.\n   */\n  clear(): void {\n    this._data = null;\n    // Note: File clearing is optional and should be done explicitly\n  }\n\n  /**\n   * Check if cache is empty.\n   */\n  isEmpty(): boolean {\n    return this._data === null;\n  }\n\n  /**\n   * Check if cache has data (including from file).\n   */\n  hasData(): boolean {\n    if (this._data !== null) return true;\n    if (this._loadFromFile) {\n      const fromFile = this._loadFromFile();\n      return fromFile !== null;\n    }\n    return false;\n  }\n}\n\n/**\n * Map-based cache for multiple items.\n */\nexport class MapCache<"+"K, V> {\n  private readonly _map: Map<"+"K, V> = new Map();\n\n  get(key: K): V | undefined {\n    return this._map.get(key);\n  }\n\n  set(key: K, value: V): void {\n    this._map.set(key, value);\n  }\n\n  has(key: K): boolean {\n    return this._map.has(key);\n  }\n\n  delete(key: K): boolean {\n    return this._map.delete(key);\n  }\n\n  clear(): void {\n    this._map.clear();\n  }\n\n  keys(): IterableIterator<"+"K> {\n    return this._map.keys();\n  }\n\n  values(): IterableIterator<"+"V> {\n    return this._map.values();\n  }\n\n  entries(): IterableIterator<"+"[K, V]> {\n    return this._map.entries();\n  }\n\n  size(): number {\n    return this._map.size;\n  }\n}"},"extensions/cali-product-workflow/modules/task.ts":{"language":"typescript","mutants":[{"id":"736","mutatorName":"StringLiteral","replacement":"``","statusReason":"expected '◐ Define the hill' to be '◐ [SHAPE-1] Define the hill' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["143"],"coveredBy":["143","144","146","147"],"location":{"end":{"column":39,"line":76},"start":{"column":24,"line":76}}},{"id":"735","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected undefined to be '○ Simp * No id required, just content.\n */\nexport interface InboxItem {\n  content: string;\n  addedAt?: string;\n  source?: string;  // Where the item came from (e.g., \"triage\", \"selection\")\n}\n\n/**\n * Status icons for display.\n */\nexport const TASK_ICONS: Record<"+"TaskStatus, string> = {\n  pending: \"○\",\n  in_progress: \"◐\",\n  completed: \"✓\",\n};\n\n/**\n * Format a task for display.\n */\nexport function formatTask(task: TaskItem): string {\n  const icon = TASK_ICONS[task.status];\n  const id = task.id ? `[${task.id}] ` : \"\";\n  return `${icon} ${id}${task.content}`;\n}\n\n/**\n * Format a list of tasks for display.\n */\nexport function formatTaskList(tasks: TaskItem[], header?: string): string {\n  const lines: string[] = [];\n  if (header) {\n    lines.push(header, \"\");\n  }\n  for (const task of tasks) {\n    lines.push(formatTask(task));\n  }\n  return lines.join(\"\\n\");\n}"}},"schemaVersion":"1.0","thresholds":{"high":70,"low":50,"break":50},"testFiles":{"tests/unit/state-real.test.ts":{"tests":[{"id":"0","name":"REAL State Functions readTracking / writeTracking readTracking returns null when tracking does not exist"},{"id":"1","name":"REAL State Functions readTracking / writeTracking readTracking reads what writeTracking wrote"},{"id":"2","name":"REAL State Functions readTracking / writeTracking writeTracking persists data across calls"},{"id":"3","name":"REAL State Functions readTracking / writeTracking handles empty workflows array"},{"id":"4","name":"REAL State Functions getActiveWorkflow returns null when no workflows"},{"id":"5","name":"REAL State Functions getActiveWorkflow returns the in-progress workflow"},{"id":"6","name":"REAL State Functions getActiveWorkflow returns null when no in-progress workflow"},{"id":"7","name":"REAL State Functions getActiveWorkflow returns first in-progress when multiple"},{"id":"8","name":"REAL State Functions getAllActiveWorkflows returns empty when no workflows"},{"id":"9","name":"REAL State Functi
