id = "stelow"
name = "Stelow"
version = "0.39.1"
min_herdr_version = "0.7.0"
description = "Persistent side panel showing stelow workflow stages, projects, scopes, and tasks with click-to-drill navigation."
platforms = ["linux", "macos"]

# Build the Rust binary before herdr registers the plugin. herdr runs this
# at install time on a non-interactive terminal, so it must complete without
# prompts. The binary lands at ./target/release/stelow which the
# [[panes]] command below references.
[[build]]
command = ["cargo", "build", "--release"]

# Pane persistente (split). A SEMPRE docked right do pane ativo.
[[panes]]
id = "board"
title = "Workflow"
placement = "split"
command = ["./target/release/stelow"]

# Action invocável via key/palette. Idempotente (open/focus/close).
[[actions]]
id = "toggle"
title = "Toggle stelow workflow board"
command = ["bash", "scripts/open-board.sh"]

# Keybinding nativa do herdr (opcional).
[[keys.command]]
key = "prefix+w"
type = "plugin_action"
command = "stelow.toggle"
description = "toggle stelow workflow board"